<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROU 租赁测算器 · CAS 21</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0a14;
  --bg-card: rgba(22, 22, 44, 0.6);
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-primary: #e8e8f0;
  --text-secondary: #9999b0;
  --accent-1: #7c5cfc;
  --accent-2: #5cfca0;
  --accent-3: #fc5c9c;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #0a0a14 0%, #12122a 30%, #16163a 60%, #0d0d24 100%);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(124, 92, 252, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 60%, rgba(92, 202, 252, 0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124, 92, 252, 0.25); border-radius: 3px; }

/* ============ Header ============ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 20, 0.8);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.header .brand { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.header .badge {
  padding: 3px 10px; border-radius: 12px; font-size: 11px;
  background: rgba(92, 252, 160, 0.12); color: var(--accent-2);
}
.header a { color: var(--text-secondary); text-decoration: none; font-size: 13px; }
.header a:hover { color: var(--text-primary); }

/* ============ Tabs ============ */
.tabs {
  position: relative; z-index: 1;
  display: flex; gap: 4px; padding: 16px 24px 0;
  border-bottom: 1px solid var(--glass-border);
  max-width: 1200px; margin: 0 auto;
  overflow-x: auto;
}
.tab {
  padding: 10px 20px; border: 1px solid transparent; border-radius: 10px 10px 0 0;
  background: transparent; color: var(--text-secondary); font-size: 14px;
  cursor: pointer; transition: var(--transition); white-space: nowrap;
  border-bottom: none;
}
.tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
.tab.active { color: #fff; background: rgba(124, 92, 252, 0.15); border-color: rgba(124, 92, 252, 0.25); }

/* ============ Main Content ============ */
.main {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 24px;
}

/* ============ Section Cards ============ */
.section {
  background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.section-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section-hint { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

/* ============ Form ============ */
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select {
  padding: 9px 12px; border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.3); color: var(--text-primary); font-size: 14px;
  outline: none; transition: var(--transition); font-family: inherit;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(124,92,252,0.12); }
.form-group select { cursor: pointer; }
.form-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-1); }
.form-group.checkbox-group { flex-direction: row; align-items: center; gap: 8px; }
.form-group.checkbox-group label { font-size: 13px; text-transform: none; cursor: pointer; }

/* ============ Buttons ============ */
.btn {
  padding: 10px 20px; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent-1); color: #fff; }
.btn-primary:hover { background: #9578ff; transform: translateY(-1px); }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-primary); border: 1px solid var(--glass-border); }
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.btn-success { background: var(--accent-2); color: #000; }
.btn-success:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-danger { background: rgba(252,92,156,0.15); color: var(--accent-3); border: 1px solid rgba(252,92,156,0.3); }
.btn-danger:hover { background: rgba(252,92,156,0.25); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

/* ============ Contract Card ============ */
.contract-card {
  background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
}
.contract-card .card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.contract-card .card-header h3 { font-size: 15px; font-weight: 600; }
.contract-card .card-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(124,92,252,0.2); color: var(--accent-1);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; margin-right: 10px;
}

/* ============ Drop Zone ============ */
.drop-zone {
  border: 2px dashed rgba(124,92,252,0.3); border-radius: var(--radius);
  padding: 40px 24px; text-align: center; cursor: pointer; transition: var(--transition);
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent-1); background: rgba(124,92,252,0.05);
}
.drop-zone .dz-icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone .dz-text { font-size: 15px; font-weight: 600; }
.drop-zone .dz-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* ============ Results ============ */
.result-summary { overflow-x: auto; }
.result-summary table { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-summary th {
  background: rgba(124,92,252,0.18); padding: 10px 12px; text-align: right;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  position: sticky; top: 0;
}
.result-summary th:first-child { text-align: left; border-radius: var(--radius-sm) 0 0 0; }
.result-summary th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
.result-summary td { padding: 9px 12px; border-bottom: 1px solid var(--glass-border); text-align: right; }
.result-summary td:first-child { text-align: left; font-weight: 600; }
.result-summary tr:hover td { background: rgba(124,92,252,0.04); }
.num-positive { color: var(--accent-1); }
.num-negative { color: var(--accent-3); }

/* ============ Amortization Detail ============ */
.amort-detail { margin-top: 20px; }
.amort-detail h4 {
  font-size: 15px; margin-bottom: 12px; padding: 10px 14px;
  background: rgba(124,92,252,0.08); border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  user-select: none;
}
.amort-detail h4:hover { background: rgba(124,92,252,0.14); }
.amort-table-wrap { max-height: 420px; overflow-y: auto; border: 1px solid var(--glass-border); border-radius: var(--radius-sm); }
.amort-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.amort-table th {
  background: rgba(0,0,0,0.3); padding: 7px 10px; text-align: right;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  position: sticky; top: 0; z-index: 1;
}
.amort-table th:first-child { text-align: center; }
.amort-table td { padding: 6px 10px; border-bottom: 1px solid var(--glass-border); text-align: right; }
.amort-table td:first-child { text-align: center; color: var(--text-secondary); }
.amort-table .col-interest { color: #fcc85c; }
.amort-table .col-principal { color: var(--accent-2); }
.amort-table tr:last-child td { font-weight: 700; }

/* ============ JE Box ============ */
.je-box {
  background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 14px 18px;
  font-family: "SF Mono", Consolas, "Source Code Pro", monospace;
  font-size: 12px; line-height: 1.8; color: #ccc; margin-top: 12px;
}
.je-box .dr { color: var(--accent-2); }
.je-box .cr { color: var(--accent-3); }
.je-box .acct { color: var(--accent-1); }

/* ============ Messages ============ */
.msg { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
.msg.show { display: block; }
.msg-success { background: rgba(92,252,160,0.06); border: 1px solid rgba(92,252,160,0.2); color: var(--accent-2); }
.msg-error { background: rgba(252,92,156,0.06); border: 1px solid rgba(252,92,156,0.2); color: var(--accent-3); }
.msg-info { background: rgba(92,202,252,0.06); border: 1px solid rgba(92,202,252,0.2); color: #8ad4ff; }

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .header { padding: 0 14px; }
  .tabs { padding: 12px 14px 0; gap: 2px; }
  .tab { padding: 8px 12px; font-size: 12px; }
  .main { padding: 14px; }
  .form-grid { grid-template-columns: 1fr; }
  .section { padding: 16px; }
}

/* ============ Utility ============ */
.hidden { display: none !important; }
.text-center { text-align: center; }
.text-secondary { color: var(--text-secondary); font-size: 13px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="brand">📊 ROU 租赁测算器 <span class="badge">CAS 21 / IFRS 16</span></div>
  <a href="index.html">← 返回应用工坊</a>
</header>

<!-- Tabs -->
<nav class="tabs">
  <button class="tab active" data-tab="tab-input" onclick="switchTab('tab-input')">📝 合同录入</button>
  <button class="tab" data-tab="tab-import" onclick="switchTab('tab-import')">📂 Excel批量导入</button>
  <button class="tab" data-tab="tab-result" onclick="switchTab('tab-result')">📊 测算结果</button>
</nav>

<!-- Main -->
<main class="main">

<!-- ============ Tab 1: Manual Input ============ -->
<div id="tab-input">
  <div class="section">
    <div class="section-title">📋 租赁合同信息</div>
    <div class="section-hint">填写一份或多份租赁合同的关键参数，支持新增/删除合同。带 * 为必填。</div>
    <div id="contracts-container"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addContract()">➕ 新增合同</button>
      <button class="btn btn-secondary" onclick="loadExampleData()">📥 加载示例数据</button>
      <button class="btn btn-secondary" onclick="clearAllContracts()">🗑️ 清空全部</button>
    </div>
  </div>

  <div class="section text-center">
    <p class="section-hint">填写完成后，点击下方按钮查看测算结果</p>
    <button class="btn btn-success" onclick="calculateAndShow()" style="font-size:16px;padding:14px 36px">
      🔢 开始测算
    </button>
  </div>
</div>

<!-- ============ Tab 2: Excel Import ============ -->
<div id="tab-import" class="hidden">
  <div class="section">
    <div class="section-title">📂 Excel 批量导入</div>
    <div class="section-hint">下载模板，填写合同信息后上传；或直接上传已有的合同清单。</div>

    <div class="btn-row mb-16">
      <button class="btn btn-primary" onclick="downloadTemplate()">📥 下载 Excel 模板</button>
    </div>

    <div class="drop-zone" id="import-drop-zone">
      <div class="dz-icon">📂</div>
      <div class="dz-text">拖入 Excel 文件或点击选择</div>
      <div class="dz-hint">支持 .xlsx / .xls / .csv 格式</div>
    </div>
    <div class="msg mt-16" id="import-msg"></div>

    <div id="import-preview" class="hidden mt-16"></div>
  </div>
</div>

<!-- ============ Tab 3: Results ============ -->
<div id="tab-result" class="hidden">
  <div id="result-content"></div>
</div>

</main>

<script>
/* ============ State ============ */
let contracts = [];

const FREQ_MAP = {
  monthly:    { label: '每月', periodsPerYear: 12 },
  quarterly:  { label: '每季度', periodsPerYear: 4 },
  semiannual: { label: '每半年', periodsPerYear: 2 },
  annual:     { label: '每年', periodsPerYear: 1 },
};

function emptyContract() {
  return {
    name: '',
    lessor: '',
    asset: '',
    startDate: '',
    endDate: '',
    paymentAmount: 0,
    paymentFrequency: 'monthly',
    paymentTiming: 'end',      // 'beginning' | 'end'
    discountRate: 4.5,         // 年折现率 %
    initialDirectCost: 0,
    restorationCost: 0,
    leaseIncentive: 0,
    residualGuarantee: 0,
    purchaseOption: 0,
    usefulLifeMonths: 0,       // 0 = use lease term
    isShortTerm: false,
    isLowValue: false,
  };
}

/* ============ Tab Switching ============ */
function switchTab(targetId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${targetId}"]`).classList.add('active');

  ['tab-input', 'tab-import', 'tab-result'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== targetId);
  });

  if (targetId === 'tab-input') renderContracts();
}

/* ============ Render Contracts ============ */
function renderContracts() {
  const container = document.getElementById('contracts-container');
  if (contracts.length === 0) {
    container.innerHTML = `<p class="text-secondary text-center" style="padding:40px">暂无合同，点击下方「新增合同」或「加载示例数据」</p>`;
    return;
  }

  container.innerHTML = contracts.map((c, i) => {
    const exempt = c.isShortTerm || c.isLowValue;
    return `
    <div class="contract-card" style="${exempt ? 'opacity:0.6' : ''}">
      <div class="card-header">
        <div style="display:flex;align-items:center">
          <span class="card-num">${i + 1}</span>
          <h3>${c.name || '未命名合同'}</h3>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-secondary" onclick="duplicateContract(${i})">📋 复制</button>
          <button class="btn btn-sm btn-danger" onclick="removeContract(${i})">✕ 删除</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>合同名称 *</label>
          <input type="text" value="${escAttr(c.name)}" placeholder="如：办公楼租赁合同"
            onchange="contracts[${i}].name=this.value">
        </div>
        <div class="form-group">
          <label>出租方</label>
          <input type="text" value="${escAttr(c.lessor)}" placeholder="如：XX物业公司"
            onchange="contracts[${i}].lessor=this.value">
        </div>
        <div class="form-group">
          <label>租赁资产</label>
          <input type="text" value="${escAttr(c.asset)}" placeholder="如：办公楼第5层"
            onchange="contracts[${i}].asset=this.value">
        </div>
        <div class="form-group">
          <label>开始日期 *</label>
          <input type="date" value="${c.startDate}"
            onchange="contracts[${i}].startDate=this.value">
        </div>
        <div class="form-group">
          <label>结束日期 *</label>
          <input type="date" value="${c.endDate}"
            onchange="contracts[${i}].endDate=this.value">
        </div>
        <div class="form-group">
          <label>每期租金 *</label>
          <input type="number" step="0.01" value="${c.paymentAmount}"
            onchange="contracts[${i}].paymentAmount=+this.value">
        </div>
        <div class="form-group">
          <label>付款频率</label>
          <select onchange="contracts[${i}].paymentFrequency=this.value">
            ${Object.entries(FREQ_MAP).map(([k,v]) =>
              `<option value="${k}" ${c.paymentFrequency===k?'selected':''}>${v.label}</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>付款时点</label>
          <select onchange="contracts[${i}].paymentTiming=this.value">
            <option value="end" ${c.paymentTiming==='end'?'selected':''}>期末付款</option>
            <option value="beginning" ${c.paymentTiming==='beginning'?'selected':''}>期初付款</option>
          </select>
        </div>
        <div class="form-group">
          <label>年折现率 (%)</label>
          <input type="number" step="0.01" value="${c.discountRate}"
            onchange="contracts[${i}].discountRate=+this.value">
        </div>
        <div class="form-group">
          <label>初始直接费用</label>
          <input type="number" step="0.01" value="${c.initialDirectCost}"
            onchange="contracts[${i}].initialDirectCost=+this.value">
        </div>
        <div class="form-group">
          <label>复原成本</label>
          <input type="number" step="0.01" value="${c.restorationCost}"
            onchange="contracts[${i}].restorationCost=+this.value">
        </div>
        <div class="form-group">
          <label>租赁激励</label>
          <input type="number" step="0.01" value="${c.leaseIncentive}"
            onchange="contracts[${i}].leaseIncentive=+this.value">
        </div>
        <div class="form-group">
          <label>余值担保</label>
          <input type="number" step="0.01" value="${c.residualGuarantee}"
            onchange="contracts[${i}].residualGuarantee=+this.value">
        </div>
        <div class="form-group">
          <label>购买行权价 (0=无)</label>
          <input type="number" step="0.01" value="${c.purchaseOption}"
            onchange="contracts[${i}].purchaseOption=+this.value">
        </div>
        <div class="form-group">
          <label>使用年限(月) (0=按租赁期)</label>
          <input type="number" value="${c.usefulLifeMonths}"
            onchange="contracts[${i}].usefulLifeMonths=+this.value">
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="st-${i}" ${c.isShortTerm?'checked':''}
            onchange="contracts[${i}].isShortTerm=this.checked;renderContracts()">
          <label for="st-${i}">短期租赁 (≤12个月，可豁免)</label>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="lv-${i}" ${c.isLowValue?'checked':''}
            onchange="contracts[${i}].isLowValue=this.checked;renderContracts()">
          <label for="lv-${i}">低价值资产 (全新价值≤4万元，可豁免)</label>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addContract() {
  contracts.push(emptyContract());
  renderContracts();
  // Scroll to last contract
  setTimeout(() => {
    document.querySelectorAll('.contract-card').forEach(el => {
      if (el === document.querySelectorAll('.contract-card')[contracts.length - 1]) {
        el.scrollIntoView({ behavior: 'smooth' });
      }
    });
  }, 50);
}

function removeContract(idx) { contracts.splice(idx, 1); renderContracts(); }
function duplicateContract(idx) {
  contracts.push(JSON.parse(JSON.stringify(contracts[idx])));
  renderContracts();
}
function clearAllContracts() { if (confirm('确定清空全部合同？')) { contracts = []; renderContracts(); } }

function loadExampleData() {
  contracts = [
    { name:'办公楼租赁', lessor:'XX物业', asset:'办公楼A座15层', startDate:'2026-01-01', endDate:'2028-12-31',
      paymentAmount:50000, paymentFrequency:'monthly', paymentTiming:'end', discountRate:4.5,
      initialDirectCost:5000, restorationCost:0, leaseIncentive:0, residualGuarantee:0,
      purchaseOption:0, usefulLifeMonths:0, isShortTerm:false, isLowValue:false },
    { name:'仓库租赁', lessor:'YY物流', asset:'3号仓库', startDate:'2026-03-01', endDate:'2028-02-28',
      paymentAmount:60000, paymentFrequency:'quarterly', paymentTiming:'beginning', discountRate:4.2,
      initialDirectCost:0, restorationCost:10000, leaseIncentive:0, residualGuarantee:0,
      purchaseOption:0, usefulLifeMonths:0, isShortTerm:false, isLowValue:false },
    { name:'设备租赁', lessor:'ZZ租赁公司', asset:'数控机床CNC-500', startDate:'2026-01-15', endDate:'2027-01-14',
      paymentAmount:8000, paymentFrequency:'monthly', paymentTiming:'end', discountRate:5.0,
      initialDirectCost:2000, restorationCost:0, leaseIncentive:3000, residualGuarantee:0,
      purchaseOption:0, usefulLifeMonths:60, isShortTerm:false, isLowValue:false },
  ];
  renderContracts();
}

/* ============ Helper ============ */
function escAttr(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============ Calculation Engine ============ */

function getPeriodRate(annualRatePct, frequency) {
  const ar = annualRatePct / 100;
  const ppy = FREQ_MAP[frequency].periodsPerYear;
  // CAS 21: 使用实际利率法，按期复利
  return Math.pow(1 + ar, 1 / ppy) - 1;
}

function getLeasePeriods(startDate, endDate, frequency) {
  const start = new Date(startDate);
  const end = new Date(endDate);
  const totalMonths = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
  const ppy = FREQ_MAP[frequency].periodsPerYear;
  const monthsPerPeriod = 12 / ppy;
  return Math.round(totalMonths / monthsPerPeriod);
}

function calcLeaseLiability(c) {
  const n = getLeasePeriods(c.startDate, c.endDate, c.paymentFrequency);
  const r = getPeriodRate(c.discountRate, c.paymentFrequency);
  const p = c.paymentAmount;
  let pv = 0;

  if (c.paymentTiming === 'end') {
    for (let t = 1; t <= n; t++) {
      pv += p / Math.pow(1 + r, t);
    }
  } else {
    // First payment at time 0
    pv = p;
    for (let t = 2; t <= n; t++) {
      pv += p / Math.pow(1 + r, t - 1);
    }
  }

  // Add residual guarantee PV (simplified: at end of lease)
  if (c.residualGuarantee > 0) {
    pv += c.residualGuarantee / Math.pow(1 + r, n);
  }

  // Add purchase option PV (simplified: exercise at end)
  if (c.purchaseOption > 0) {
    pv += c.purchaseOption / Math.pow(1 + r, n);
  }

  return { pv, n, r };
}

function calcROUAsset(leaseLiabilityPV, c) {
  return leaseLiabilityPV + c.initialDirectCost + c.restorationCost - c.leaseIncentive;
}

function calcAmortization(c, leaseLiability, rouAsset) {
  const { n, r } = leaseLiability;
  const payment = c.paymentAmount;
  const startDate = new Date(c.startDate);

  // Depreciation period
  const totalMonths = (new Date(c.endDate).getFullYear() - startDate.getFullYear()) * 12
    + (new Date(c.endDate).getMonth() - startDate.getMonth());
  const deprMonths = c.usefulLifeMonths > 0 ? Math.min(c.usefulLifeMonths, totalMonths) : totalMonths;
  const ppy = FREQ_MAP[c.paymentFrequency].periodsPerYear;
  const monthsPerPeriod = 12 / ppy;
  const deprPerPeriod = rouAsset * (monthsPerPeriod / deprMonths);

  let openingLiability = leaseLiability.pv;
  const schedule = [];
  let totalInterest = 0;
  let accumulatedDepr = 0;
  let rouNet = rouAsset;

  for (let t = 1; t <= n; t++) {
    const interest = openingLiability * r;
    let principal;
    if (c.paymentTiming === 'beginning' && t === 1) {
      principal = payment; // Full first payment is principal
    } else {
      principal = payment - interest;
    }
    const closingLiability = openingLiability - principal;

    // Depreciation for this period
    const depr = Math.min(deprPerPeriod, rouNet);
    accumulatedDepr += depr;
    rouNet = Math.max(0, rouAsset - accumulatedDepr);

    totalInterest += interest;

    const periodDate = new Date(startDate);
    periodDate.setMonth(periodDate.getMonth() + Math.round(t * monthsPerPeriod));

    schedule.push({
      period: t,
      date: fmtDate(periodDate),
      openingLiability: Math.max(0, openingLiability),
      payment,
      interest,
      principal,
      closingLiability: Math.max(0, closingLiability),
      depr,
      accumulatedDepr,
      rouNet,
    });

    openingLiability = closingLiability;
  }

  return {
    rouAsset,
    leaseLiabilityPV: leaseLiability.pv,
    totalPayments: payment * n,
    totalInterest,
    totalDepr: accumulatedDepr,
    n,
    r,
    deprPerPeriod,
    deprMonths,
    schedule,
  };
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtNum(num) {
  if (Math.abs(num) < 0.005) return '0.00';
  return Number(num).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtMoney(num) {
  return Number(num).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ============ Calculate & Show ============ */
let lastResults = [];

function calculateAndShow() {
  // Validate
  const errors = [];
  contracts.forEach((c, i) => {
    if (!c.name) errors.push(`合同 ${i+1}: 请填写合同名称`);
    if (!c.startDate) errors.push(`合同 ${i+1}: 请选择开始日期`);
    if (!c.endDate) errors.push(`合同 ${i+1}: 请选择结束日期`);
    if (c.paymentAmount <= 0) errors.push(`合同 ${i+1}: 每期租金须大于0`);
    if (c.discountRate < 0) errors.push(`合同 ${i+1}: 折现率不能为负`);
    if (new Date(c.endDate) <= new Date(c.startDate))
      errors.push(`合同 ${i+1}: 结束日期必须晚于开始日期`);
  });

  if (errors.length > 0) {
    document.getElementById('result-content').innerHTML = `
      <div class="msg msg-error show">${errors.join('<br>')}</div>`;
    switchTab('tab-result');
    return;
  }

  lastResults = contracts.map(c => {
    if (c.isShortTerm || c.isLowValue) {
      const n = getLeasePeriods(c.startDate, c.endDate, c.paymentFrequency);
      return {
        contract: c,
        exempted: true,
        exemptReason: c.isShortTerm ? '短期租赁（≤12个月）' : '低价值资产租赁',
        totalPayments: c.paymentAmount * n,
        n,
        schedule: [],
      };
    }

    const ll = calcLeaseLiability(c);
    const rou = calcROUAsset(ll.pv, c);
    const amort = calcAmortization(c, ll, rou);
    return { contract: c, ll, rou, amort, exempted: false };
  });

  renderResults();
  switchTab('tab-result');
}

  const zone = document.getElementById('import-drop-zone');
  zone.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';

function handleImportFile(file) {
  const msg = document.getElementById('import-msg');
  const preview = document.getElementById('import-preview');
  msg.classList.remove('show');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (rows.length === 0) throw new Error('文件中没有数据');

      const imported = rows.map((r, i) => ({
        name: String(r['合同名称'] || r['name'] || `合同${i+1}`),
        lessor: String(r['出租方'] || r['lessor'] || ''),
        asset: String(r['租赁资产'] || r['asset'] || ''),
        startDate: parseDateStr(r['开始日期'] || r['startDate']),
        endDate: parseDateStr(r['结束日期'] || r['endDate']),
        paymentAmount: parseFloat(r['每期租金'] || r['paymentAmount'] || 0),
        paymentFrequency: parseFreq(r['付款频率'] || r['paymentFrequency']),
        paymentTiming: parseTiming(r['付款时点'] || r['paymentTiming']),
        discountRate: parseFloat(r['年折现率(%)'] || r['discountRate'] || 4.5),
        initialDirectCost: parseFloat(r['初始直接费用'] || r['initialDirectCost'] || 0),
        restorationCost: parseFloat(r['复原成本'] || r['restorationCost'] || 0),
        leaseIncentive: parseFloat(r['租赁激励'] || r['leaseIncentive'] || 0),
        residualGuarantee: parseFloat(r['余值担保'] || r['residualGuarantee'] || 0),
        purchaseOption: parseFloat(r['购买行权价'] || r['purchaseOption'] || 0),
        usefulLifeMonths: parseInt(r['使用年限(月)'] || r['usefulLifeMonths'] || 0) || 0,
        isShortTerm: parseBool(r['短期租赁'] || r['isShortTerm']),
        isLowValue: parseBool(r['低价值资产'] || r['isLowValue']),
      }));

      contracts = imported;
      msg.className = 'msg msg-success show';
      msg.textContent = `✅ 成功导入 ${imported.length} 份合同`;

      // Show preview
      preview.classList.remove('hidden');
      preview.innerHTML = `
        <div class="section-title">📋 导入预览</div>
        <div class="result-summary"><table>
          <thead><tr>
            <th>#</th><th>合同名称</th><th>开始日期</th><th>结束日期</th>
            <th>每期租金</th><th>付款频率</th><th>折现率</th><th>豁免</th>
          </tr></thead>
          <tbody>
            ${imported.map((c, i) => `<tr>
              <td>${i+1}</td><td>${escHtml(c.name)}</td><td>${c.startDate}</td><td>${c.endDate}</td>
              <td>${fmtMoney(c.paymentAmount)}</td>
              <td>${FREQ_MAP[c.paymentFrequency]?.label||''}</td>
              <td>${c.discountRate}%</td>
              <td>${c.isShortTerm?'短期':''}${c.isLowValue?'低价值':''}${!c.isShortTerm&&!c.isLowValue?'—':''}</td>
            </tr>`).join('')}
          </tbody>

    } catch(err) {
      msg.className = 'msg msg-error show';
      msg.textContent = '❌ 导入失败: ' + err.message;

    }
  };
  reader.readAsArrayBuffer(file);
}

function parseDateStr(v) {
  if (!v) return '';
  // Handle Excel serial number
  if (typeof v === 'number') {
    const d = new Date((v - 25569) * 86400 * 1000);
    return fmtDate(d);
  }
  const s = String(v).trim();
  // Try yyyy-mm-dd or yyyy/mm/dd
  const m = s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // Try yyyy年mm月dd日
  const m2 = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m2) return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  return s;
}

function parseFreq(v) {
  const s = String(v).toLowerCase().trim();
  if (s.includes('quarter') || s.includes('季')) return 'quarterly';
  if (s.includes('semi') || s.includes('半年')) return 'semiannual';
  if (s.includes('annual') || s.includes('年')) return 'annual';
  return 'monthly';
}

function parseTiming(v) {
  const s = String(v).toLowerCase().trim();
  if (s.includes('begin') || s.includes('期初')) return 'beginning';
  return 'end';
}

function parseBool(v) {
  if (typeof v === 'boolean') return v;
  const s = String(v).toLowerCase().trim();
  return s === 'true' || s === 'yes' || s === '是' || s === '1';
}

/* ============ Export Results ============ */
function downloadResultsExcel() {
  if (lastResults.length === 0) return;
  try {
    const rows = [['合同名称','租赁期(月)','付款期数','每期租金','付款总额','租赁负债(PV)','ROU资产','总利息','月折旧额','状态']];
    lastResults.forEach(r => {
      const c = r.contract;
      const totalMonths = (new Date(c.endDate).getFullYear() - new Date(c.startDate).getFullYear()) * 12
        + (new Date(c.endDate).getMonth() - new Date(c.startDate).getMonth());
      if (r.exempted) {
        rows.push([c.name, totalMonths, r.n, c.paymentAmount, r.totalPayments, '', '', '', '', '豁免-'+r.exemptReason]);
      } else {
        const deprPerMonth = r.amort.deprMonths > 0 ? +(r.amort.rouAsset / r.amort.deprMonths).toFixed(2) : 0;
        rows.push([c.name, totalMonths, r.amort.n, c.paymentAmount, +r.amort.totalPayments.toFixed(2),
          +r.amort.leaseLiabilityPV.toFixed(2), +r.amort.rouAsset.toFixed(2),
          +r.amort.totalInterest.toFixed(2), deprPerMonth, '正常']);
      }
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!ref'] = XLSX.utils.encode_range({ s: {r:0,c:0}, e: {r:rows.length-1, c:rows[0].length-1} });
    ws['!cols'] = rows[0].map(() => ({ wch: 16 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'ROU测算汇总');
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ROU租赁测算结果.xlsx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(err) {
    showExportMsg('❌ 导出失败: ' + err.message, 'error');
  }
}

function downloadFullAmortExcel() {
  if (lastResults.length === 0) return;
  showExportMsg('正在生成全部摊销明细，请稍候...', 'info');

  try {
    const wb = XLSX.utils.book_new();
    const usedNames = new Set();
    const sheetNameMap = []; // idx -> sheet name (for cross-sheet refs)

    // === Step 1: Build detail sheets first, record names ===
    lastResults.forEach((r, idx) => {
      if (r.exempted || r.amort.schedule.length === 0) return;
      const c = r.contract;
      const n = r.amort.n;
      const payment = c.paymentAmount;
      const isBeginning = c.paymentTiming === 'beginning';
      const periodRate = r.amort.r; // decimal, e.g. 0.003675
      const rouAsset = r.amort.rouAsset;
      const deprPerPeriod = r.amort.deprPerPeriod;
      const openingPV = r.amort.leaseLiabilityPV;

      // Build sheet manually with formulas
      const ws = {};

      // --- Parameter area at P1:Q5 (right side) ---
      ws['P1'] = { t: 's', v: '每期租金' };     ws['Q1'] = { t: 'n', v: payment };
      ws['P2'] = { t: 's', v: '期折现率' };      ws['Q2'] = { t: 'n', v: +periodRate.toFixed(8) };
      ws['P3'] = { t: 's', v: 'ROU资产原值' };   ws['Q3'] = { t: 'n', v: +rouAsset.toFixed(2) };
      ws['P4'] = { t: 's', v: '每期折旧额' };     ws['Q4'] = { t: 'n', v: +deprPerPeriod.toFixed(2) };
      ws['P5'] = { t: 's', v: '租赁负债(PV)' };  ws['Q5'] = { t: 'n', v: +openingPV.toFixed(2) };

      // --- Headers (Row 1) ---
      const headers = ['期数','日期','期初负债','本期付款','利息费用','偿还本金','期末负债','本期折旧','累计折旧','ROU净值'];
      headers.forEach((h, i) => {
        const cell = XLSX.utils.encode_cell({ r: 0, c: i });
        ws[cell] = { t: 's', v: h };
      });

      // --- Data rows ---
      const schedule = r.amort.schedule;
      for (let t = 0; t < schedule.length; t++) {
        const row = t + 1; // Excel row (1-indexed, row 1 is header)
        const s = schedule[t];

        // A: 期数 (static)
        ws[XLSX.utils.encode_cell({ r: row, c: 0 })] = { t: 'n', v: s.period };
        // B: 日期 (static)
        ws[XLSX.utils.encode_cell({ r: row, c: 1 })] = { t: 's', v: s.date };

        // C: 期初负债
        if (t === 0) {
          ws[XLSX.utils.encode_cell({ r: row, c: 2 })] = { t: 'n', v: +openingPV.toFixed(2) };
        } else {
          const prevG = XLSX.utils.encode_cell({ r: row - 1, c: 6 });
          ws[XLSX.utils.encode_cell({ r: row, c: 2 })] = { t: 'n', f: prevG, v: +s.openingLiability.toFixed(2) };
        }

        // D: 本期付款 = $Q$1
        ws[XLSX.utils.encode_cell({ r: row, c: 3 })] = { t: 'n', f: '$Q$1', v: payment };

        // E & F: 利息 & 本金
        if (isBeginning && t === 0) {
          ws[XLSX.utils.encode_cell({ r: row, c: 4 })] = { t: 'n', v: 0 };
          ws[XLSX.utils.encode_cell({ r: row, c: 5 })] = { t: 'n', f: '$Q$1', v: payment };
        } else {
          const cellC = XLSX.utils.encode_cell({ r: row, c: 2 });
          const cellD = XLSX.utils.encode_cell({ r: row, c: 3 });
          const cellE = XLSX.utils.encode_cell({ r: row, c: 4 });
          ws[XLSX.utils.encode_cell({ r: row, c: 4 })] = { t: 'n', f: cellC + '*$Q$2', v: +s.interest.toFixed(2) };
          ws[XLSX.utils.encode_cell({ r: row, c: 5 })] = { t: 'n', f: cellD + '-' + cellE, v: +s.principal.toFixed(2) };
        }

        // G: 期末负债 = C - F
        {
          const cellC = XLSX.utils.encode_cell({ r: row, c: 2 });
          const cellF = XLSX.utils.encode_cell({ r: row, c: 5 });
          ws[XLSX.utils.encode_cell({ r: row, c: 6 })] = { t: 'n', f: cellC + '-' + cellF, v: +s.closingLiability.toFixed(2) };
        }

        // H: 本期折旧 = $Q$4
        ws[XLSX.utils.encode_cell({ r: row, c: 7 })] = { t: 'n', f: '$Q$4', v: +s.depr.toFixed(2) };

        // I: 累计折旧
        if (t === 0) {
          const cellH = XLSX.utils.encode_cell({ r: row, c: 7 });
          ws[XLSX.utils.encode_cell({ r: row, c: 8 })] = { t: 'n', f: cellH, v: +s.accumulatedDepr.toFixed(2) };
        } else {
          const prevI = XLSX.utils.encode_cell({ r: row - 1, c: 8 });
          const cellH = XLSX.utils.encode_cell({ r: row, c: 7 });
          ws[XLSX.utils.encode_cell({ r: row, c: 8 })] = { t: 'n', f: prevI + '+' + cellH, v: +s.accumulatedDepr.toFixed(2) };
        }

        // J: ROU净值 = ROU资产 - 累计折旧
        {
          const cellI = XLSX.utils.encode_cell({ r: row, c: 8 });
          ws[XLSX.utils.encode_cell({ r: row, c: 9 })] = { t: 'n', f: '$Q$3-' + cellI, v: +s.rouNet.toFixed(2) };
        }
      }

      // Define sheet range
      ws['!ref'] = XLSX.utils.encode_range({
        s: { r: 0, c: 0 },
        e: { r: schedule.length, c: headers.length - 1 }
      });
      ws['!cols'] = headers.map(() => ({ wch: 14 }));

      // Generate unique sheet name (Excel max 31 chars)
      let base = (c.name || '合同' + (idx + 1)).replace(/[\\\/\*\?\[\]:]/g, '-');
      let sheetName = base.substring(0, 31);
      let counter = 1;
      while (usedNames.has(sheetName)) {
        const suffix = `(${counter})`;
        sheetName = base.substring(0, 31 - suffix.length) + suffix;
        counter++;
      }
      usedNames.add(sheetName);
      sheetNameMap.push(sheetName);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    // === Step 2: Build summary sheet with cross-sheet formulas ===
    {
      const sh = ['合同名称','租赁期(月)','每期租金','付款总额','租赁负债(PV)','ROU资产','总利息','月折旧额'];
      const wsS = {};

      // Header row
      sh.forEach((h, ci) => {
        wsS[XLSX.utils.encode_cell({ r: 0, c: ci })] = { t: 's', v: h };
      });

      let row = 1;
      lastResults.forEach((r, idx) => {
        const sn = sheetNameMap[idx];
        const c = r.contract;
        const m = (new Date(c.endDate).getFullYear() - new Date(c.startDate).getFullYear()) * 12
          + (new Date(c.endDate).getMonth() - new Date(c.startDate).getMonth());

        // A: 合同名称
        wsS[XLSX.utils.encode_cell({ r: row, c: 0 })] = { t: 's', v: c.name || '合同' + (idx + 1) };
        // B: 租赁期(月)
        wsS[XLSX.utils.encode_cell({ r: row, c: 1 })] = { t: 'n', v: m };

        if (!r.exempted && sn) {
          const ref = (cell) => "'" + sn + "'!" + cell;
          const deprPerMonth = r.amort.deprMonths > 0 ? +(r.amort.rouAsset / r.amort.deprMonths).toFixed(2) : 0;
          // C: 每期租金 → detail!$Q$1
          wsS[XLSX.utils.encode_cell({ r: row, c: 2 })] = { t: 'n', f: ref('$Q$1'), v: c.paymentAmount };
          // D: 付款总额 → 每期租金×期数
          wsS[XLSX.utils.encode_cell({ r: row, c: 3 })] = { t: 'n', f: XLSX.utils.encode_cell({ r: row, c: 2 }) + '*' + r.amort.n, v: +r.amort.totalPayments.toFixed(2) };
          // E: 租赁负债(PV) → detail!$Q$5
          wsS[XLSX.utils.encode_cell({ r: row, c: 4 })] = { t: 'n', f: ref('$Q$5'), v: +r.amort.leaseLiabilityPV.toFixed(2) };
          // F: ROU资产 → detail!$Q$3
          wsS[XLSX.utils.encode_cell({ r: row, c: 5 })] = { t: 'n', f: ref('$Q$3'), v: +r.amort.rouAsset.toFixed(2) };
          // G: 总利息 → D - E (付款总额 - PV)
          wsS[XLSX.utils.encode_cell({ r: row, c: 6 })] = { t: 'n', f: XLSX.utils.encode_cell({ r: row, c: 3 }) + '-' + XLSX.utils.encode_cell({ r: row, c: 4 }), v: +r.amort.totalInterest.toFixed(2) };
          // H: 月折旧额 → detail!$Q$4
          wsS[XLSX.utils.encode_cell({ r: row, c: 7 })] = { t: 'n', f: ref('$Q$4'), v: deprPerMonth };
        } else {
          // Exempted
          wsS[XLSX.utils.encode_cell({ r: row, c: 2 })] = { t: 'n', v: c.paymentAmount };
          wsS[XLSX.utils.encode_cell({ r: row, c: 3 })] = { t: 'n', v: r.totalPayments };
          wsS[XLSX.utils.encode_cell({ r: row, c: 4 })] = { t: 's', v: '豁免' };
          wsS[XLSX.utils.encode_cell({ r: row, c: 5 })] = { t: 's', v: '豁免' };
          wsS[XLSX.utils.encode_cell({ r: row, c: 6 })] = { t: 's', v: '' };
          wsS[XLSX.utils.encode_cell({ r: row, c: 7 })] = { t: 's', v: '' };
        }
        row++;
      });

      wsS['!ref'] = XLSX.utils.encode_range({ s: {r:0,c:0}, e: {r:row-1, c:sh.length-1} });
      wsS['!cols'] = sh.map(() => ({ wch: 17 }));
      XLSX.utils.book_append_sheet(wb, wsS, '汇总');
    }

    // === Step 3: Download ===
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ROU租赁摊销明细_全部合同.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    showExportMsg(`✅ 导出成功！包含 ${usedNames.size - 1} 份合同的摊销明细`, 'success');
  } catch (err) {
    showExportMsg('❌ 导出失败: ' + err.message, 'error');
    console.error('导出全部摊销明细错误:', err);
  }
}

function showExportMsg(text, type) {
  let el = document.getElementById('export-msg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'export-msg';
    el.className = 'msg';
    const resultDiv = document.getElementById('result-content');
    if (resultDiv) resultDiv.insertBefore(el, resultDiv.firstChild);
  }
  el.textContent = text;
  el.className = 'msg msg-' + type + ' show';
}

/* ============ Initialize ============ */
loadExampleData();
renderContracts();
</script>
