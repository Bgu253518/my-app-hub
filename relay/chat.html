<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中转站 · 与 AI 对话</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a14; --card: rgba(22,22,44,0.6); --border: rgba(255,255,255,0.08);
    --text: #e8e8f0; --text2: #b0b0c0; --accent: #7c5cfc; --green: #5cfca0; --red: #fc5c9c;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { width: 500px; height: 750px; max-width: 95vw; max-height: 95vh; background: var(--card); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(20px); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 60px rgba(0,0,0,0.4); }
  .header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header .status { font-size: 11px; }
  .header .status.online { color: var(--green); }
  .header .status.offline { color: var(--text2); }
  .header .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(124,92,252,0.2); color: #b4a0ff; }

  .token-bar { display: flex; gap: 6px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: rgba(252,200,92,0.04); align-items: center; }
  .token-bar input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.3); color: var(--text); font-size: 11px; outline: none; font-family: monospace; }
  .token-bar input:focus { border-color: var(--accent); }
  .token-bar .btn { padding: 6px 12px; border: 1px solid var(--accent); border-radius: 8px; background: transparent; color: var(--accent); font-size: 11px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
  .token-bar .btn:hover { background: rgba(124,92,252,0.15); }
  .token-bar .btn.saved { border-color: var(--green); color: var(--green); }
  .token-bar .hint { font-size: 10px; color: var(--text2); }

  .messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; animation: fadeIn 0.25s ease; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.6; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: rgba(124,92,252,0.2); border: 1px solid rgba(124,92,252,0.15); }
  .msg.assistant { align-self: flex-start; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
  .msg.system { align-self: center; font-size: 12px; color: var(--text2); background: rgba(255,255,255,0.02); padding: 6px 12px; border-radius: 8px; }
  .msg.error { align-self: center; font-size: 12px; color: var(--red); background: rgba(252,92,156,0.08); padding: 6px 12px; border-radius: 8px; }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: typingAnim 1.4s infinite ease-in-out; }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-4px); opacity: 1; } }

  .input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.15); }
  .input-row textarea { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; resize: none; outline: none; line-height: 1.4; max-height: 120px; }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row button { width: 44px; height: 44px; border: none; border-radius: 50%; background: var(--accent); color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s; flex-shrink: 0; align-self: flex-end; }
  .input-row button:hover { background: #9578ff; transform: scale(1.05); }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(124,92,252,0.3); border-radius: 2px; }

  .poll-status { font-size: 10px; color: var(--text2); text-align: center; padding: 4px; flex-shrink: 0; opacity: 0.6; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔄 中转站</h1>
    <div>
      <span class="badge">v1</span>
      <span class="status offline" id="status-indicator">⏳ 等待 Token</span>
    </div>
  </div>

  <div class="token-bar">
    <input type="password" id="token-input" placeholder="ghp_... GitHub Token (public_repo)" autocomplete="off">
    <button class="btn" id="save-token-btn" onclick="saveToken()">保存</button>
    <span class="hint">Token 存浏览器本地</span>
  </div>

  <div class="messages" id="messages">
    <div class="msg system">👋 你好！请先填入 GitHub Token（需要 public_repo 权限）</div>
  </div>

  <div class="poll-status" id="poll-status"></div>

  <div class="input-row">
    <textarea id="chat-input" rows="2" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" disabled></textarea>
    <button id="send-btn" disabled onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const REPO = 'Bgu253518/my-app-hub';
const BRANCH = 'main';
let token = '';
let mySeq = 0;
let lastServerSeq = 0;
let isSending = false;
let pollTimer = null;
let conversation = [];

// Load saved token
(function() {
  const saved = localStorage.getItem('relay_github_token');
  if (saved) {
    document.getElementById('token-input').value = '★★★★★★★★★★★★★★★★★★★★';
    document.getElementById('save-token-btn').textContent = '✓ 已保存';
    document.getElementById('save-token-btn').className = 'btn saved';
    token = saved;
    document.getElementById('status-indicator').textContent = '● 就绪';
    document.getElementById('status-indicator').className = 'status online';
    document.getElementById('chat-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
    startPolling();
  }
})();

function saveToken() {
  const input = document.getElementById('token-input');
  const val = input.value.trim();
  if (!val || val.startsWith('★')) return;
  if (!val.startsWith('ghp_')) {
    alert('请填入有效的 GitHub Token（以 ghp_ 开头）');
    return;
  }
  localStorage.setItem('relay_github_token', val);
  token = val;
  input.value = '★★★★★★★★★★★★★★★★★★★★';
  document.getElementById('save-token-btn').textContent = '✓ 已保存';
  document.getElementById('save-token-btn').className = 'btn saved';
  document.getElementById('status-indicator').textContent = '● 就绪';
  document.getElementById('status-indicator').className = 'status online';
  document.getElementById('chat-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
  addMessage('system', '✅ Token 已保存，可以开始对话了！');
  startPolling();
}

function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-el';
  div.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-el');
  if (el) el.remove();
}

// GitHub API helpers
async function ghGet(path) {
  const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH, {
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error('GET ' + path + ' -> ' + r.status);
  const data = await r.json();
  const content = atob(data.content);
  return { content: JSON.parse(content), sha: data.sha };
}

async function ghPut(path, content, sha, msg) {
  const body = {
    message: msg || 'relay: update ' + path,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(content)))),
    branch: BRANCH
  };
  if (sha) body.sha = sha;
  const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const text = await r.text();
    throw new Error('PUT ' + path + ' -> ' + r.status + ': ' + text);
  }
  return await r.json();
}

// Send message
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', msg);
  conversation.push({ role: 'user', content: msg });
  showTyping();
  document.getElementById('poll-status').textContent = '⏳ 发送中...';

  isSending = true;
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;

  try {
    // Read current inbox
    const inbox = await ghGet('relay/inbox.json');
    mySeq = inbox.content.sequence + 1;
    inbox.content.messages.push({ seq: mySeq, content: msg, timestamp: new Date().toISOString() });
    inbox.content.sequence = mySeq;

    // Write message to inbox
    await ghPut('relay/inbox.json', inbox.content, inbox.sha, 'relay: message #' + mySeq);

    // Set outbox to waiting state
    const outbox = { responses: [], lastSequence: 0, waitingFor: mySeq, timestamp: new Date().toISOString() };
    let outboxSha = null;
    try {
      const existing = await ghGet('relay/outbox.json');
      outboxSha = existing.sha;
    } catch(e) {}
    await ghPut('relay/outbox.json', outbox, outboxSha, 'relay: waiting for response #' + mySeq);

    document.getElementById('poll-status').textContent = '⏳ 等待 AI 回复...';

  } catch (err) {
    hideTyping();
    addMessage('error', '❌ 发送失败: ' + err.message);
    document.getElementById('poll-status').textContent = '❌ 发送失败';
    isSending = false;
    document.getElementById('send-btn').disabled = false;
    input.disabled = false;
    input.focus();
    return;
  }
}

// Poll for responses
async function pollForResponse() {
  if (!token) return;
  try {
    const outbox = await ghGet('relay/outbox.json');
    const data = outbox.content;

    if (data.waitingFor === mySeq && data.lastSequence >= mySeq) {
      hideTyping();
      const response = data.responses.find(r => r.seq === mySeq);
      if (response) {
        addMessage('assistant', response.content);
        conversation.push({ role: 'assistant', content: response.content });
        document.getElementById('poll-status').textContent = '✓ 已回复';
        lastServerSeq = mySeq;
      }
      isSending = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chat-input').disabled = false;
      document.getElementById('chat-input').focus();
    } else if (data.waitingFor > mySeq) {
      hideTyping();
      document.getElementById('poll-status').textContent = '✓ 已同步';
      isSending = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chat-input').disabled = false;
    } else if (data.waitingFor === mySeq) {
      document.getElementById('poll-status').textContent = '⏳ 等待 AI 回复...';
    } else {
      document.getElementById('poll-status').textContent = '● 监听中';
    }
  } catch (err) {
    if (isSending) {
      document.getElementById('poll-status').textContent = '⏳ 轮询中...';
    }
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollForResponse, 5000);
  setTimeout(pollForResponse, 1000);
}

// Enter to send
document.addEventListener('DOMContentLoaded', function() {
  const input = document.getElementById('chat-input');
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
