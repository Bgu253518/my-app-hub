<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App Hub - 私有应用中心</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 锁定界面 ====== -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h1>私有应用中心</h1>
      <p class="lock-subtitle">请输入主密码解锁</p>
      <div class="lock-form" id="lockForm">
        <input type="password" id="masterPassword" placeholder="输入主密码" autocomplete="off" autofocus>
        <button id="unlockBtn" class="btn btn-primary">解锁</button>
      </div>
      <div class="lock-form hidden" id="setupForm">
        <input type="password" id="newPassword" placeholder="设置主密码（至少6位）" autocomplete="off">
        <input type="password" id="confirmPassword" placeholder="确认主密码" autocomplete="off">
        <button id="setupBtn" class="btn btn-primary">创建并进入</button>
      </div>
      <p class="lock-hint">🔑 首次使用请设置你的主密码</p>
      <p id="lockMsg" class="msg"></p>
    </div>
  </div>

  <!-- ====== 主应用界面 ====== -->
  <div class="main-app hidden" id="mainApp">
    <header>
      <div class="header-left">
        <h1>My App Hub</h1>
        <span class="badge">🔒 私有模式</span>
      </div>
      <div class="header-right">
        <button id="lockBtn" class="btn btn-outline">🔒 锁定</button>
        <button id="logoutBtn" class="btn btn-outline">退出并清除数据</button>
      </div>
    </header>

    <!-- API密钥管理 -->
    <section class="panel" id="apiPanel">
      <h2>API 密钥管理</h2>
      <p class="desc">密钥使用你的主密码加密存储在浏览器本地，不会上传到任何服务器</p>
      <div class="api-keys" id="apiKeys">
        <div class="key-row">
          <label>Anthropic API Key (Claude)</label>
          <div class="key-input-group">
            <input type="password" id="anthropicKey" placeholder="sk-ant-..." autocomplete="off">
            <button class="btn btn-sm" data-save="anthropic">保存</button>
            <button class="btn btn-sm" data-toggle="anthropic">👁</button>
          </div>
          <span class="key-status" data-key="anthropic"></span>
        </div>
        <div class="key-row">
          <label>OpenAI API Key</label>
          <div class="key-input-group">
            <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off">
            <button class="btn btn-sm" data-save="openai">保存</button>
            <button class="btn btn-sm" data-toggle="openai">👁</button>
          </div>
          <span class="key-status" data-key="openai"></span>
        </div>
        <div class="key-row">
          <label>自定义 API Key</label>
          <div class="key-input-group">
            <input type="password" id="customKey" placeholder="输入任意 API Key" autocomplete="off">
            <button class="btn btn-sm" data-save="custom">保存</button>
            <button class="btn btn-sm" data-toggle="custom">👁</button>
          </div>
          <span class="key-status" data-key="custom"></span>
        </div>
      </div>
    </section>

    <!-- 应用列表 -->
    <section class="panel">
      <h2>应用列表</h2>
      <div class="apps-grid">
        <div class="app-card" data-app="ai-chat">
          <div class="app-icon">🤖</div>
          <h3>AI 聊天助手</h3>
          <p>基于 Claude / GPT 的智能对话</p>
          <span class="tag tag-ready">就绪</span>
        </div>
        <div class="app-card" data-app="translator">
          <div class="app-icon">🌐</div>
          <h3>智能翻译</h3>
          <p>多语言即时翻译</p>
          <span class="tag tag-soon">即将推出</span>
        </div>
        <div class="app-card" data-app="pdf-splitter" data-action="launch" data-src="apps/pdf-splitter.html">
          <div class="app-icon">📄</div>
          <h3>PDF 拆图工具</h3>
          <p>PDF 逐页导出为图片，一键打包下载</p>
          <span class="tag tag-ready">可用</span>
        </div>
        <div class="app-card" data-app="codegen">
          <div class="app-icon">💻</div>
          <h3>代码生成</h3>
          <p>自然语言生成代码</p>
          <span class="tag tag-soon">即将推出</span>
        </div>
      </div>
    </section>

    <!-- App 运行区域 -->
    <div class="app-runner hidden" id="appRunner">
      <div class="app-runner-header">
        <span id="appRunnerTitle">PDF 拆图工具</span>
        <button id="appRunnerClose" class="btn btn-sm">✕ 关闭</button>
      </div>
      <iframe id="appFrame" src="" class="app-frame" allow="clipboard-write"></iframe>
    </div>

    <footer>
      <p>私有应用中心 v1.0 — 数据仅存储于本机浏览器</p>
    </footer>
  </div>

  <script src="js/crypto-helper.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
