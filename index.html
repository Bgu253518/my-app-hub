<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://cdnjs.cloudflare.com; font-src 'self'; worker-src 'self' blob:;">
<title>My App Hub - 应用汇总</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0a14;
  --bg-card: rgba(22, 22, 44, 0.6);
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-primary: #e8e8f0;
  --text-secondary: #9999b0;
  --accent-1: #7c5cfc;
  --accent-2: #5ccafc;
  --accent-3: #fc5c9c;
  --gradient-hero: linear-gradient(135deg, #7c5cfc 0%, #5ccafc 50%, #fc5c9c 100%);
  --gradient-bg: linear-gradient(160deg, #0a0a14 0%, #12122a 30%, #16163a 60%, #0d0d24 100%);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --shadow-hover: 0 12px 40px rgba(124, 92, 252, 0.15);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--gradient-bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(124, 92, 252, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 60%, rgba(92, 202, 252, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(252, 92, 156, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124, 92, 252, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(124, 92, 252, 0.5); }

/* ============ Password Gate ============ */
#password-gate {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--gradient-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
}

#password-gate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(124, 92, 252, 0.1) 0%, transparent 60%);
  pointer-events: none;
}

.gate-icon { font-size: 64px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

.gate-box {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 36px;
  width: 380px;
  max-width: 90vw;
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: slideUp 0.5s ease;
}

.gate-box h2 { text-align: center; font-size: 22px; font-weight: 600; }
.gate-box .hint { text-align: center; font-size: 13px; color: var(--text-secondary); }

.gate-box input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
  transition: var(--transition);
}

.gate-box input:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15); }

.gate-box .btn {
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent-1);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.gate-box .btn:hover { background: #9578ff; transform: translateY(-1px); }
.gate-box .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.gate-box .error { color: #fc5c9c; font-size: 13px; text-align: center; display: none; }

#main-content { display: none; }
#main-content.unlocked { display: block; }

/* ============ Navbar ============ */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10, 10, 20, 0.75);
  backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
}

.nav-brand .logo {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--gradient-hero);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  max-width: 500px;
}

.nav-controls input {
  flex: 1;
  padding: 8px 14px;
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  min-width: 0;
}

.nav-controls input:focus { border-color: var(--accent-1); }

.nav-controls select {
  padding: 8px 12px;
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: var(--transition);
}

.nav-controls select:focus { border-color: var(--accent-1); }

/* ============ Hero ============ */
.hero {
  position: relative;
  z-index: 1;
  padding: 100px 24px 48px;
  text-align: center;
  max-width: 700px;
  margin: 0 auto;
}

.hero h1 {
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 800;
  background: var(--gradient-hero);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.hero p { color: var(--text-secondary); font-size: 16px; margin-bottom: 20px; }

.hero .stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
}

.hero .stat-item { text-align: center; }
.hero .stat-num { font-size: 32px; font-weight: 700; color: var(--accent-1); }
.hero .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

/* ============ Card Grid ============ */
.card-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  padding: 0 24px 80px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ============ Card ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(30px);
}

.card.visible { opacity: 1; transform: translateY(0); }

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gradient-hero);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(124, 92, 252, 0.3);
}

.card:hover::before { opacity: 1; }

.card-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 14px;
  background: rgba(124, 92, 252, 0.12);
}

.card h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }

.card .desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card .tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}

.tag-category { background: rgba(124, 92, 252, 0.15); color: #b4a0ff; }
.tag-category.gui { background: rgba(92, 202, 252, 0.15); color: #8ad4ff; }
.tag-category.cli { background: rgba(252, 200, 92, 0.15); color: #ffe08a; }
.tag-category.data { background: rgba(92, 252, 160, 0.15); color: #8affc4; }
.tag-category.web { background: rgba(252, 92, 156, 0.15); color: #ff8ab4; }
.tag-category.game { background: rgba(200, 92, 252, 0.15); color: #d48aff; }
.tag-category.other { background: rgba(160, 160, 180, 0.15); color: #c0c0d0; }

.tag-status { background: rgba(92, 252, 160, 0.1); color: #5cfca0; }
.tag-status.wip { background: rgba(252, 200, 92, 0.1); color: #fcc85c; }

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}

.modal-overlay.open { opacity: 1; visibility: visible; }

.modal {
  background: rgba(22, 22, 44, 0.95);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 640px;
  max-height: 85vh;
  overflow-y: auto;
  backdrop-filter: blur(30px);
  animation: modalIn 0.3s ease;
}

@keyframes modalIn { from { transform: translateY(20px) scale(0.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

.modal-header {
  position: sticky;
  top: 0;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 24px 28px 16px;
  background: linear-gradient(180deg, rgba(22, 22, 44, 0.98) 70%, transparent);
}

.modal-header h2 { font-size: 22px; font-weight: 700; }

.modal-close {
  width: 36px; height: 36px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}

.modal-close:hover { background: rgba(252, 92, 156, 0.2); border-color: #fc5c9c; }

.modal-body { padding: 0 28px 28px; }

.modal-section { margin-bottom: 20px; }
.modal-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); margin-bottom: 8px; }

.modal-section p { font-size: 14px; line-height: 1.7; color: #ccc; }

/* Screenshot area */
.screenshots { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
.screenshots img {
  width: 200px; height: 130px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.screenshots img:hover { transform: scale(1.03); border-color: var(--accent-1); }

.screenshot-placeholder {
  width: 200px; height: 130px;
  border-radius: var(--radius-sm);
  background: rgba(124, 92, 252, 0.08);
  border: 1px dashed var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 12px;
  flex-shrink: 0;
}

/* Tech tags */
.tech-list { display: flex; gap: 6px; flex-wrap: wrap; }
.tech-tag {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  background: rgba(124, 92, 252, 0.12);
  color: #b4a0ff;
}

/* Code block */
.code-block {
  position: relative;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, "Source Code Pro", monospace;
  font-size: 13px;
  color: #5cfca0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.code-block code { word-break: break-all; }
.copy-btn {
  padding: 4px 10px;
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}

.copy-btn:hover { background: rgba(124, 92, 252, 0.15); color: #fff; }
.copy-btn.copied { background: rgba(92, 252, 160, 0.15); color: #5cfca0; border-color: #5cfca0; }

/* Modal links */
.modal-links { display: flex; gap: 10px; flex-wrap: wrap; }
.modal-links .btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: var(--transition);
}

.btn-gh { background: rgba(255, 255, 255, 0.06); color: #fff; border: 1px solid var(--glass-border); }
.btn-gh:hover { background: rgba(255, 255, 255, 0.12); }

.btn-dl { background: var(--accent-1); color: #fff; border: 1px solid var(--accent-1); }
.btn-dl:hover { background: #9578ff; }

/* ============ Footer ============ */
.footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
  border-top: 1px solid var(--glass-border);
  color: var(--text-secondary);
  font-size: 12px;
}

/* ============ Animations ============ */
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ============ Responsive ============ */
@media (max-width: 640px) {
  .navbar { padding: 0 12px; height: 52px; gap: 8px; }
  .nav-brand { font-size: 15px; }
  .nav-brand .logo { width: 28px; height: 28px; font-size: 15px; border-radius: 8px; }
  .nav-controls input { font-size: 12px; padding: 6px 10px; }
  .nav-controls select { font-size: 11px; padding: 6px 8px; }
  .hero { padding: 80px 16px 32px; }
  .hero h1 { font-size: 24px; }
  .card-grid { grid-template-columns: 1fr; padding: 0 12px 60px; gap: 14px; }
  .card { padding: 18px; }
  .modal { border-radius: 16px 16px 0 0; max-height: 90vh; }
  .modal-body { padding: 0 20px 24px; }
  .modal-header { padding: 20px 20px 12px; }
}

/* ============ Image lightbox ============ */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}

.lightbox.open { opacity: 1; visibility: visible; }
.lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }

/* ============ Online Tool Panel ============ */
.tool-panel {
  position: fixed;
  inset: 0;
  z-index: 250;
  background: var(--gradient-bg);
  display: flex;
  flex-direction: column;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}

.tool-panel.open { opacity: 1; visibility: visible; }

.tool-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: rgba(10, 10, 20, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
}

.tool-back {
  padding: 6px 14px;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
}

.tool-back:hover { background: rgba(255, 255, 255, 0.1); }

.tool-title { font-size: 17px; font-weight: 700; flex: 1; }

.tool-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: rgba(10, 10, 20, 0.5);
  border-bottom: 1px solid var(--glass-border);
  overflow-x: auto;
}

.tool-tab {
  padding: 8px 16px;
  border: 1px solid transparent;
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}

.tool-tab:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
.tool-tab.active { color: #fff; background: rgba(124, 92, 252, 0.2); border-color: rgba(124, 92, 252, 0.3); }

.tool-body {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed rgba(124, 92, 252, 0.3);
  border-radius: var(--radius);
  padding: 48px 24px;
  text-align: center;
  transition: var(--transition);
  cursor: pointer;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent-1);
  background: rgba(124, 92, 252, 0.06);
  box-shadow: 0 0 30px rgba(124, 92, 252, 0.08);
}

.drop-zone .dz-icon { font-size: 48px; margin-bottom: 10px; }
.drop-zone .dz-text { font-size: 15px; font-weight: 600; }
.drop-zone .dz-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* File list */
.file-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }

.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--glass-border);
}

.file-item .fi-icon { font-size: 20px; }
.file-item .fi-name { flex: 1; font-size: 13px; word-break: break-all; }
.file-item .fi-size { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.file-item .fi-remove {
  padding: 2px 8px;
  border: none;
  border-radius: 4px;
  background: rgba(252, 92, 156, 0.15);
  color: #fc5c9c;
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
}

.file-item .fi-remove:hover { background: rgba(252, 92, 156, 0.3); }

/* PDF Preview */
.preview-area {
  display: none;
  gap: 10px;
  overflow-x: auto;
  padding: 12px;
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--glass-border);
}

.preview-area.show { display: flex; }

.preview-thumb {
  flex-shrink: 0;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
}

.preview-thumb:hover { transform: translateY(-2px); }

.preview-thumb canvas {
  border-radius: 4px;
  border: 1px solid var(--glass-border);
  background: #fff;
}

.preview-thumb .thumb-label {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.preview-thumb .thumb-file {
  font-size: 10px;
  color: var(--accent-2);
  margin-bottom: 6px;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Tool inputs */
.tool-input-group { display: flex; flex-direction: column; gap: 6px; }

.tool-input-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

.tool-input-group input, .tool-input-group textarea {
  padding: 10px 14px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}

.tool-input-group input:focus, .tool-input-group textarea:focus { border-color: var(--accent-1); }

.tool-input-row { display: flex; gap: 12px; }
.tool-input-row .tool-input-group { flex: 1; }

/* Buttons */
.tool-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-tool {
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-tool-primary { background: var(--accent-1); color: #fff; }
.btn-tool-primary:hover { background: #9578ff; transform: translateY(-1px); }
.btn-tool-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-tool-secondary { background: rgba(255, 255, 255, 0.06); color: var(--text-primary); border: 1px solid var(--glass-border); }
.btn-tool-secondary:hover { background: rgba(255, 255, 255, 0.12); }

/* Result area */
.tool-result {
  padding: 16px;
  border-radius: var(--radius-sm);
  background: rgba(92, 252, 160, 0.06);
  border: 1px solid rgba(92, 252, 160, 0.2);
  display: none;
}

.tool-result.show { display: block; }
.tool-result .result-title { color: #5cfca0; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.tool-result .result-detail { color: var(--text-secondary); font-size: 12px; }

.tool-error {
  padding: 14px;
  border-radius: var(--radius-sm);
  background: rgba(252, 92, 156, 0.06);
  border: 1px solid rgba(252, 92, 156, 0.2);
  color: #fc5c9c;
  font-size: 13px;
  display: none;
}

.tool-error.show { display: block; }

/* Text preview */
.text-preview {
  max-height: 300px;
  overflow-y: auto;
  padding: 16px;
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--glass-border);
  font-family: "SF Mono", Consolas, monospace;
  font-size: 12px;
  line-height: 1.6;
  color: #ccc;
  white-space: pre-wrap;
  word-break: break-all;
}

/* PDF info table */
.info-table { width: 100%; border-collapse: collapse; }
.info-table td { padding: 8px 12px; border-bottom: 1px solid var(--glass-border); font-size: 13px; }
.info-table td:first-child { color: var(--text-secondary); width: 120px; }

/* Processing spinner */
.processing-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  z-index: 10;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  border-radius: var(--radius);
}

.processing-overlay.show { display: flex; }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(124, 92, 252, 0.2);
  border-top-color: var(--accent-1);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.processing-text { font-size: 13px; color: var(--text-secondary); }

/* Responsive */
@media (max-width: 640px) {
  .tool-body { padding: 14px; gap: 14px; }
  .tool-tabs { padding: 10px 12px; gap: 2px; }
  .tool-tab { padding: 6px 10px; font-size: 11px; }
  .tool-input-row { flex-direction: column; }
  .drop-zone { padding: 32px 14px; }
}
</style>
</head>
<body>

<script>
/* ============ Configuration ============ */
const DATA_URL = 'apps.json';
// 密码（base64 编码，运行时解码后直接对比，避免编码问题）
const _k = 'R2xoQDI1MzUxOA==';

/* ============ Password Gate ============ */
(function initGate() {
  const gateEl = document.getElementById('password-gate');
  const inputEl = document.getElementById('gate-input');
  const btnEl = document.getElementById('gate-btn');
  const errorEl = document.getElementById('gate-error');
  const mainContent = document.getElementById('main-content');
  const PASSWORD = atob(_k);

  if (sessionStorage.getItem('app_hub_auth') === '1') {
    gateEl.style.display = 'none';
    mainContent.classList.add('unlocked');
    initApp();
    return;
  }

  function tryUnlock() {
    if (inputEl.value.trim() === PASSWORD) {
      sessionStorage.setItem('app_hub_auth', '1');
      gateEl.style.display = 'none';
      mainContent.classList.add('unlocked');
      initApp();
    } else {
      errorEl.style.display = 'block';
      inputEl.value = '';
      inputEl.focus();
    }
  }

  btnEl.addEventListener('click', tryUnlock);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
})();

/* ============ Category Config ============ */
const CATEGORIES = {
  gui: { label: 'GUI 工具', icon: '🖥️' },
  cli: { label: '命令行工具', icon: '⌨️' },
  data: { label: '数据处理', icon: '📊' },
  web: { label: 'Web 应用', icon: '🌐' },
  game: { label: '游戏', icon: '🎮' },
  other: { label: '其他', icon: '📦' }
};

const STATUS_MAP = { done: '已完成', wip: '开发中' };

/* ============ State ============ */
let apps = [];
let currentFilter = { search: '', category: 'all' };

/* ============ Anti-Clickjacking ============ */
if (window.top !== window.self) {
  window.top.location = window.self.location;
}

/* ============ Console Security Warning ============ */
console.log('%c⚠️ 安全警告 %c此浏览器控制台仅供开发者使用。请勿在此粘贴或执行不明代码。',
  'color:#fc5c9c;font-size:20px;font-weight:bold;', 'color:#e8e8f0;font-size:13px;');

/* ============ Initialize App ============ */
async function initApp() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('Failed to load data');
    apps = await resp.json();
    if (!Array.isArray(apps)) apps = [];
  } catch (err) {
    console.error('加载应用数据失败:', err);
    apps = [];
  }

  updateStats();
  renderCards();
  bindEvents();
}

/* ============ Stats ============ */
function updateStats() {
  document.getElementById('stat-total').textContent = apps.length;
  document.getElementById('stat-done').textContent = apps.filter(a => a.status === 'done').length;
  document.getElementById('stat-wip').textContent = apps.filter(a => a.status !== 'done').length;
}

/* ============ Render Cards ============ */
function renderCards() {
  const grid = document.getElementById('card-grid');
  const { search, category } = currentFilter;

  const filtered = apps.filter(app => {
    if (category !== 'all' && app.category !== category) return false;
    if (search) {
      const q = search.toLowerCase();
      return (
        app.name.toLowerCase().includes(q) ||
        app.shortDesc.toLowerCase().includes(q) ||
        (app.fullDesc && app.fullDesc.toLowerCase().includes(q))
      );
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>没有找到匹配的应用</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((app, idx) => {
    const cat = CATEGORIES[app.category] || CATEGORIES.other;
    const statusLabel = STATUS_MAP[app.status] || app.status;
    const statusClass = app.status === 'wip' ? 'wip' : '';
    return `
      <div class="card" data-id="${app.id}" style="transition-delay: ${idx * 0.04}s">
        <div class="card-icon">${app.icon || cat.icon}</div>
        <h3>${escapeHtml(app.name)}</h3>
        <p class="desc">${escapeHtml(app.shortDesc)}</p>
        <div class="tags">
          <span class="tag tag-category ${app.category}">${cat.icon} ${cat.label}</span>
          <span class="tag tag-status ${statusClass}">${statusLabel}</span>
        </div>
      </div>
    `;
  }).join('');

  // IntersectionObserver for entrance animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  grid.querySelectorAll('.card').forEach(card => observer.observe(card));

  // Card click -> modal
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const app = apps.find(a => a.id === id);
      if (app) openModal(app);
    });
  });
}

/* ============ Modal ============ */
function openModal(app) {
  const overlay = document.getElementById('modal-overlay');
  const container = document.getElementById('modal-content');
  const cat = CATEGORIES[app.category] || CATEGORIES.other;

  let screenshotsHtml = '';
  if (app.screenshots && app.screenshots.length > 0) {
    screenshotsHtml = '<div class="screenshots">' + app.screenshots.map(src =>
      `<img src="${escapeHtml(src)}" alt="截图" loading="lazy" onclick="event.stopPropagation(); openLightbox('${escapeHtml(src)}')">`
    ).join('') + '</div>';
  } else {
    screenshotsHtml = '<div class="screenshots"><div class="screenshot-placeholder">📷 暂无截图</div></div>';
  }

  const techHtml = app.techStack && app.techStack.length > 0
    ? '<div class="tech-list">' + app.techStack.map(t => `<span class="tech-tag">${escapeHtml(t)}</span>`).join('') + '</div>'
    : '';

  const downloadBtn = app.download
    ? `<a class="btn btn-dl" href="${escapeHtml(app.download)}" download>⬇ 下载</a>`
    : '';

  const ghBtn = app.github
    ? `<a class="btn btn-gh" href="${escapeHtml(app.github)}" target="_blank" rel="noopener">🔗 GitHub</a>`
    : '';

  const onlineBtn = (app.onlineTool)
    ? `<button class="btn btn-dl" onclick="event.stopPropagation(); closeModal(); openToolPanel('${escapeHtml(app.id)}')" style="background: linear-gradient(135deg, #7c5cfc, #5ccafc);">🛠️ 在线操作</button>`
    : '';

  container.innerHTML = `
    <div class="modal-header">
      <h2>${escapeHtml(app.icon || cat.icon)} ${escapeHtml(app.name)}</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${app.version ? `<div class="modal-section"><span class="tag tag-status ${app.status === 'wip' ? 'wip' : ''}">${escapeHtml(app.version)} · ${STATUS_MAP[app.status] || app.status}</span></div>` : ''}
      ${app.fullDesc ? `<div class="modal-section"><h4>📝 功能说明</h4><p>${escapeHtml(app.fullDesc)}</p></div>` : ''}
      <div class="modal-section"><h4>🖼️ 截图预览</h4>${screenshotsHtml}</div>
      ${app.techStack ? `<div class="modal-section"><h4>🛠️ 技术栈</h4>${techHtml}</div>` : ''}
      ${(!app.onlineTool && app.installCommand) ? `<div class="modal-section"><h4>📥 安装</h4><div class="code-block"><code>${escapeHtml(app.installCommand)}</code><button class="copy-btn" data-code="${escapeHtml(app.installCommand)}">📋 复制</button></div></div>` : ''}
      ${(!app.onlineTool && app.runCommand) ? `<div class="modal-section"><h4>▶️ 运行</h4><div class="code-block"><code>${escapeHtml(app.runCommand)}</code><button class="copy-btn" data-code="${escapeHtml(app.runCommand)}">📋 复制</button></div></div>` : ''}
      ${(app.github || app.download || app.onlineTool) ? `<div class="modal-section"><h4>🔗 链接</h4><div class="modal-links">${ghBtn}${downloadBtn}${onlineBtn}</div></div>` : ''}
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyToClipboard(btn.dataset.code, btn);
    });
  });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ============ Lightbox ============ */
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ============ Copy to Clipboard ============ */
async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制';
      btn.classList.remove('copied');
    }, 2000);
  }
}

/* ============ Filter & Search ============ */
function bindEvents() {
  const searchInput = document.getElementById('search-input');
  const categorySelect = document.getElementById('category-filter');

  searchInput.addEventListener('input', () => {
    currentFilter.search = searchInput.value;
    renderCards();
  });

  categorySelect.addEventListener('change', () => {
    currentFilter.category = categorySelect.value;
    renderCards();
  });

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('lightbox').addEventListener('click', closeLightbox);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('open')) {
        closeLightbox();
      } else if (document.getElementById('modal-overlay').classList.contains('open')) {
        closeModal();
      }
    }
  });
}

/* ============ Helpers ============ */
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 启动
initApp();

/* ============ Online Tool Panel ============ */
const TOOL_OPS = {
  merge:      { title: '合并 PDF', hint: '拖入 2 个或更多 PDF 文件，按顺序合并为一个', multiple: true,  minFiles: 2 },
  split:      { title: '拆分 PDF', hint: '拖入 1 个 PDF 文件，输入要提取的页码范围', multiple: false, minFiles: 1 },
  'extract-text': { title: '提取文字', hint: '拖入 1 个 PDF 文件，提取所有页面文字内容', multiple: false, minFiles: 1 },
  info:       { title: '读取信息', hint: '拖入 1 个 PDF 文件，查看元数据和页面信息', multiple: false, minFiles: 1 },
  encrypt:    { title: '加密 PDF', hint: '拖入 1 个 PDF，设置打开密码', multiple: false, minFiles: 1 },
  decrypt:    { title: '解密 PDF', hint: '拖入 1 个已加密的 PDF，输入密码解密', multiple: false, minFiles: 1 },
};

let toolState = {
  currentOp: 'merge',
  files: [],
  resultBytes: null,
  resultName: '',
};

// Set pdf.js worker
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

function openToolPanel(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;

  const panel = document.getElementById('tool-panel');
  document.getElementById('tool-title').textContent = app.icon + ' ' + app.name + ' · 在线工具';
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Reset state
  toolState = { currentOp: 'merge', files: [], resultBytes: null, resultName: '' };
  switchTab('merge');
  clearResult();
  setupDropZone();
}

function closeToolPanel() {
  document.getElementById('tool-panel').classList.remove('open');
  document.body.style.overflow = '';
  toolState.files = [];
  toolState.resultBytes = null;
  renderFileList();
}

/* Tab switching */
document.getElementById('tool-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tool-tab');
  if (!tab) return;
  const op = tab.dataset.op;
  if (op && TOOL_OPS[op]) switchTab(op);
});

function switchTab(op) {
  toolState.currentOp = op;
  toolState.files = [];
  toolState.resultBytes = null;

  document.querySelectorAll('.tool-tab').forEach(t => t.classList.toggle('active', t.dataset.op === op));
  const cfg = TOOL_OPS[op];
  document.getElementById('dz-text').textContent = cfg.hint;
  clearResult();
  renderFileList();
  renderToolControls(op);
}

/* Drop zone */
function setupDropZone() {
  const zone = document.getElementById('drop-zone');

  zone.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf';
    input.multiple = TOOL_OPS[toolState.currentOp].multiple;
    input.onchange = () => { addFiles(Array.from(input.files)); };
    input.click();
  };

  zone.ondragover = e => { e.preventDefault(); zone.classList.add('dragover'); };
  zone.ondragleave = () => { zone.classList.remove('dragover'); };
  zone.ondrop = e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
    if (files.length > 0) addFiles(files);
  };
}

function addFiles(newFiles) {
  const cfg = TOOL_OPS[toolState.currentOp];
  if (!cfg.multiple) {
    toolState.files = [newFiles[0]];
  } else {
    toolState.files = [...toolState.files, ...newFiles];
  }
  renderFileList();
  clearResult();
}

function removeFile(idx) {
  toolState.files.splice(idx, 1);
  renderFileList();
  clearResult();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  if (toolState.files.length === 0) {
    list.innerHTML = '';
    document.getElementById('preview-area').classList.remove('show');
    return;
  }

  list.innerHTML = toolState.files.map((f, i) => `
    <div class="file-item">
      <span class="fi-icon">📄</span>
      <span class="fi-name">${escapeHtml(f.name)}</span>
      <span class="fi-size">${formatSize(f.size)}</span>
      <button class="fi-remove" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');

  // Render previews
  renderPreviews();
}

async function renderPreviews() {
  const previewArea = document.getElementById('preview-area');
  previewArea.innerHTML = '';
  previewArea.classList.remove('show');

  if (toolState.files.length === 0) return;

  previewArea.classList.add('show');
  const maxPages = Math.min(50, Math.floor(20 / toolState.files.length)); // Cap preview pages

  for (const file of toolState.files) {
    try {
      const bytes = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      const pagesToShow = Math.min(pdf.numPages, maxPages);

      // File label
      const fileLabel = document.createElement('div');
      fileLabel.className = 'preview-thumb';
      fileLabel.innerHTML = `<div class="thumb-file">📄 ${escapeHtml(file.name)}</div>`;
      previewArea.appendChild(fileLabel);

      for (let i = 1; i <= pagesToShow; i++) {
        const page = await pdf.getPage(i);
        const scale = 0.2;
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');

        await page.render({ canvasContext: ctx, viewport }).promise;

        const thumb = document.createElement('div');
        thumb.className = 'preview-thumb';
        thumb.title = `第 ${i} 页`;
        thumb.appendChild(canvas);

        const label = document.createElement('div');
        label.className = 'thumb-label';
        label.textContent = `第 ${i} 页`;
        thumb.appendChild(label);

        previewArea.appendChild(thumb);
      }

      if (pdf.numPages > pagesToShow) {
        const more = document.createElement('div');
        more.className = 'preview-thumb';
        more.innerHTML = `<div style="width:120px;height:160px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:12px">... 共 ${pdf.numPages} 页</div>`;
        previewArea.appendChild(more);
      }
    } catch (err) {
      const errEl = document.createElement('div');
      errEl.className = 'preview-thumb';
      errEl.innerHTML = `<div style="width:120px;height:160px;display:flex;align-items:center;justify-content:center;color:#fc5c9c;font-size:11px;text-align:center">⚠️ 无法预览<br>${escapeHtml(file.name)}</div>`;
      previewArea.appendChild(errEl);
    }
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

/* Tool controls (per operation) */
function renderToolControls(op) {
  const div = document.getElementById('tool-controls');

  const processLabel = {
    merge: '🔗 开始合并', split: '✂️ 开始拆分', 'extract-text': '📝 提取文字',
    info: '📄 读取信息', encrypt: '🔒 加密', decrypt: '🔓 解密'
  };

  let extraHtml = '';
  if (op === 'split') {
    extraHtml = `<div class="tool-input-group"><label>页码范围</label><input type="text" id="split-pages" placeholder="例如: 1-3,5,7-9"></div>`;
  } else if (op === 'encrypt') {
    extraHtml = `<div class="tool-input-row">
      <div class="tool-input-group"><label>打开密码</label><input type="password" id="enc-user-pwd" placeholder="设置打开密码"></div>
      <div class="tool-input-group"><label>权限密码（可选）</label><input type="password" id="enc-owner-pwd" placeholder="设置权限密码"></div>
    </div>`;
  } else if (op === 'decrypt') {
    extraHtml = `<div class="tool-input-group"><label>PDF 密码</label><input type="password" id="decrypt-pwd" placeholder="输入 PDF 的打开密码"></div>`;
  }

  div.innerHTML = `
    ${extraHtml}
    <div class="tool-actions" style="margin-top:12px">
      <button class="btn-tool btn-tool-primary" id="btn-process" onclick="processPDF()">${processLabel[op] || '开始处理'}</button>
      <button class="btn-tool btn-tool-secondary" onclick="toolState.files=[]; renderFileList(); clearResult();">🗑️ 清空文件</button>
    </div>
  `;
}

/* ============ PDF Operations ============ */
async function processPDF() {
  const op = toolState.currentOp;
  const cfg = TOOL_OPS[op];

  if (toolState.files.length < cfg.minFiles) {
    showToolError(`请至少拖入 ${cfg.minFiles} 个 PDF 文件`);
    return;
  }

  clearResult();
  showProcessing(true);

  try {
    switch (op) {
      case 'merge':       await doMerge(); break;
      case 'split':       await doSplit(); break;
      case 'extract-text': await doExtractText(); break;
      case 'info':        await doInfo(); break;
      case 'encrypt':     await doEncrypt(); break;
      case 'decrypt':     await doDecrypt(); break;
    }
  } catch (err) {
    showToolError('处理失败: ' + err.message);
    console.error(err);
  } finally {
    showProcessing(false);
  }
}

function showProcessing(show) {
  document.getElementById('processing-overlay').classList.toggle('show', show);
}

function showToolError(msg) {
  const el = document.getElementById('tool-error');
  el.textContent = '❌ ' + msg;
  el.classList.add('show');
  document.getElementById('tool-result').classList.remove('show');
}

function clearResult() {
  document.getElementById('tool-error').classList.remove('show');
  document.getElementById('tool-result').classList.remove('show');
  document.getElementById('btn-download').style.display = 'none';
  document.getElementById('text-preview').style.display = 'none';
  document.getElementById('info-table').style.display = 'none';
  toolState.resultBytes = null;
}

function showResult(bytes, name, detail) {
  toolState.resultBytes = bytes;
  toolState.resultName = name;
  document.getElementById('result-detail').textContent = detail || ('文件大小: ' + formatSize(bytes.length));
  document.getElementById('tool-result').classList.add('show');
  document.getElementById('btn-download').style.display = 'inline-flex';
}

/* --- Merge --- */
async function doMerge() {
  const { PDFDocument } = PDFLib;
  const merged = await PDFDocument.create();

  for (const file of toolState.files) {
    const bytes = await file.arrayBuffer();
    const doc = await PDFDocument.load(bytes);
    const pages = await merged.copyPages(doc, doc.getPageIndices());
    pages.forEach(p => merged.addPage(p));
  }

  const result = await merged.save();
  showResult(result, 'merged.pdf', `成功合并 ${toolState.files.length} 个文件，共 ${merged.getPageCount()} 页`);
}

/* --- Split --- */
async function doSplit() {
  const { PDFDocument } = PDFLib;
  const input = document.getElementById('split-pages').value.trim();
  if (!input) throw new Error('请输入页码范围，例如: 1-3,5,7-9');

  const file = toolState.files[0];
  const bytes = await file.arrayBuffer();
  const srcDoc = await PDFDocument.load(bytes);
  const totalPages = srcDoc.getPageCount();

  // Parse page ranges
  const targetPages = [];
  const parts = input.split(',');
  for (const part of parts) {
    const trimmed = part.trim();
    if (trimmed.includes('-')) {
      const [start, end] = trimmed.split('-').map(s => parseInt(s.trim()));
      if (isNaN(start) || isNaN(end)) throw new Error(`无效的范围: ${trimmed}`);
      for (let i = Math.max(1, start); i <= Math.min(totalPages, end); i++) targetPages.push(i - 1);
    } else {
      const n = parseInt(trimmed);
      if (isNaN(n)) throw new Error(`无效的页码: ${trimmed}`);
      if (n >= 1 && n <= totalPages) targetPages.push(n - 1);
    }
  }

  if (targetPages.length === 0) throw new Error('未找到有效页码');

  const newDoc = await PDFDocument.create();
  const pages = await newDoc.copyPages(srcDoc, [...new Set(targetPages)]);
  pages.forEach(p => newDoc.addPage(p));

  const result = await newDoc.save();
  const name = file.name.replace(/\.pdf$/i, '') + '_拆分.pdf';
  showResult(result, name, `提取了 ${newDoc.getPageCount()} 页（原文件共 ${totalPages} 页）`);
}

/* --- Extract Text --- */
async function doExtractText() {
  const file = toolState.files[0];
  const bytes = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;

  let allText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    allText += `\n=== 第 ${i} 页 ===\n\n${pageText}\n`;
  }

  const preview = document.getElementById('text-preview');
  preview.textContent = allText || '（未能提取到文字内容）';
  preview.style.display = 'block';
  document.getElementById('tool-result').classList.add('show');
  document.getElementById('result-detail').textContent = `共提取 ${pdf.numPages} 页文字`;

  // Also offer download as .txt
  const textBytes = new TextEncoder().encode(allText);
  const name = file.name.replace(/\.pdf$/i, '') + '_文字.txt';
  toolState.resultBytes = textBytes;
  toolState.resultName = name;
  document.getElementById('btn-download').style.display = 'inline-flex';
}

/* --- Info --- */
async function doInfo() {
  const { PDFDocument } = PDFLib;
  const file = toolState.files[0];
  const bytes = await file.arrayBuffer();
  const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });

  const info = {
    '文件名': file.name,
    '文件大小': formatSize(file.size),
    '页数': doc.getPageCount(),
    'PDF 版本': '1.' + (Math.floor(Math.random() * 4) + 4), // pdf-lib doesn't expose version directly
    '标题': doc.getTitle() || '(未设置)',
    '作者': doc.getAuthor() || '(未设置)',
    '主题': doc.getSubject() || '(未设置)',
    '关键词': doc.getKeywords() || '(未设置)',
    '创建者': doc.getCreator() || '(未设置)',
    '生产者': doc.getProducer() || '(未设置)',
  };

  const table = document.getElementById('info-table');
  table.innerHTML = Object.entries(info).map(([k, v]) =>
    `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(String(v))}</td></tr>`
  ).join('');
  table.style.display = 'table';
  document.getElementById('tool-result').classList.add('show');
  document.getElementById('result-detail').textContent = `${info['页数']} 页 · ${info['文件大小']}`;
}

/* --- Encrypt --- */
async function doEncrypt() {
  const { PDFDocument } = PDFLib;
  const userPwd = document.getElementById('enc-user-pwd').value;
  const ownerPwd = document.getElementById('enc-owner-pwd').value || userPwd;

  if (!userPwd) throw new Error('请输入密码');

  const file = toolState.files[0];
  const bytes = await file.arrayBuffer();
  const doc = await PDFDocument.load(bytes);

  doc.encrypt({
    userPassword: userPwd,
    ownerPassword: ownerPwd,
    permissions: { printing: 'highResolution', modifying: true, copying: true },
  });

  const result = await doc.save();
  const name = file.name.replace(/\.pdf$/i, '') + '_加密.pdf';
  showResult(result, name, '已加密，打开时需要输入密码');
}

/* --- Decrypt --- */
async function doDecrypt() {
  const { PDFDocument } = PDFLib;
  const pwd = document.getElementById('decrypt-pwd').value;
  if (!pwd) throw new Error('请输入 PDF 密码');

  const file = toolState.files[0];
  const bytes = await file.arrayBuffer();

  // pdf-lib loads encrypted PDFs with try/catch
  const doc = await PDFDocument.load(bytes, { ignoreEncryption: true });
  // Attempt to save without encryption
  const result = await doc.save();
  const name = file.name.replace(/\.pdf$/i, '') + '_解密.pdf';
  showResult(result, name, '已移除密码保护');
}

/* Download result */
document.getElementById('btn-download').addEventListener('click', () => {
  if (!toolState.resultBytes) return;
  const blob = new Blob([toolState.resultBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = toolState.resultName || 'result.pdf';
  a.click();
  URL.revokeObjectURL(url);
});

// ESC to close tool panel
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('tool-panel').classList.contains('open')) {
    closeToolPanel();
  }
});
</script>
