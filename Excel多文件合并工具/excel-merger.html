<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel 多文件合并工具</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0a0a14; --bg-card: rgba(22,22,44,0.6);
  --glass-border: rgba(255,255,255,0.08);
  --text-primary: #e8e8f0; --text-secondary: #9999b0;
  --accent-1: #7c5cfc; --accent-2: #5cfca0; --accent-3: #fc5c9c;
  --radius: 14px; --radius-sm: 8px; --transition: 0.2s ease;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #0a0a14 0%, #12122a 30%, #16163a 60%, #0d0d24 100%);
  color: var(--text-primary); min-height: 100vh; line-height: 1.6;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(124,92,252,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 60%, rgba(252,92,156,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124,92,252,0.25); border-radius: 3px; }
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,20,0.8); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.header .brand { font-size: 17px; font-weight: 700; }
.header a { color: var(--text-secondary); text-decoration: none; font-size: 13px; padding: 6px 14px; border: 1px solid var(--glass-border); border-radius: 8px; transition: var(--transition); }
.header a:hover { color: var(--text-primary); border-color: rgba(124,92,252,0.3); }
.main { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 24px; }
.section {
  background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-hint { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
.drop-zone {
  border: 2px dashed rgba(124,92,252,0.3); border-radius: var(--radius);
  padding: 48px 24px; text-align: center; cursor: pointer; transition: var(--transition);
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent-1); background: rgba(124,92,252,0.06); }
.drop-zone .dz-icon { font-size: 48px; margin-bottom: 10px; }
.drop-zone .dz-text { font-size: 15px; font-weight: 600; }
.drop-zone .dz-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.file-grid { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; margin: 12px 0; }
.file-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
}
.file-card .fc-icon { font-size: 20px; }
.file-card .fc-name { flex: 1; font-size: 13px; font-weight: 600; }
.file-card .fc-count { font-size: 11px; color: var(--text-secondary); }
.file-card .fc-remove { padding: 2px 8px; border: none; border-radius: 4px; background: rgba(252,92,156,0.15); color: #fc5c9c; font-size: 11px; cursor: pointer; }
.file-card .fc-remove:hover { background: rgba(252,92,156,0.3); }
.sheet-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
.sheet-table th, .sheet-table td { padding: 8px 12px; border-bottom: 1px solid var(--glass-border); font-size: 13px; text-align: left; }
.sheet-table th { color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.sheet-table tr:hover { background: rgba(255,255,255,0.02); }
.sheet-table input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent-1); cursor: pointer; }
.sheet-table input[type="text"] { padding: 4px 8px; border: 1px solid var(--glass-border); border-radius: 4px; background: rgba(0,0,0,0.3); color: var(--text-primary); font-size: 13px; width: 100%; max-width: 200px; }
.btn {
  padding: 10px 20px; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent-1); color: #fff; }
.btn-primary:hover { background: #9578ff; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-primary); border: 1px solid var(--glass-border); }
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.tool-actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 0; }
.result-box {
  padding: 16px; border-radius: var(--radius-sm);
  border: 1px solid rgba(92,252,160,0.2); background: rgba(92,252,160,0.06);
  display: none; margin-top: 16px;
}
.result-box.show { display: block; }
.result-box .result-title { color: #5cfca0; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.result-box .result-detail { color: var(--text-secondary); font-size: 12px; }
.processing { display: none; align-items: center; gap: 10px; padding: 12px 0; color: var(--text-secondary); font-size: 13px; }
.processing.show { display: flex; }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(124,92,252,0.2); border-top-color: var(--accent-1); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { padding: 40px; text-align: center; color: var(--text-secondary); font-size: 14px; }
.select-all { font-size: 12px; color: var(--accent-2); cursor: pointer; margin-left: 12px; }
.select-all:hover { text-decoration: underline; }
@media (max-width: 640px) {
  .main { padding: 14px; } .section { padding: 16px; }
  .drop-zone { padding: 32px 14px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="brand">📑 Excel 多文件合并工具</div>
  <a href="index.html">← 返回首页</a>
</div>
<div class="main">
  <div class="section">
    <div class="section-title">📂 上传 Excel 文件</div>
    <div class="section-hint">支持 .xlsx / .xls 格式，上传后自动扫描所有工作表</div>
    <div class="drop-zone" id="dropZone">
      <div class="dz-icon">📂</div>
      <div class="dz-text">拖拽 Excel 文件到此处，或点击选择文件</div>
      <div class="dz-hint">支持同时选择多个文件</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".xlsx,.xls" style="display:none">

    <div class="processing" id="processing">
      <div class="spinner"></div>
      <span>正在解析文件...</span>
    </div>
  </div>

  <div class="section" id="sheetsSection" style="display:none">
    <div class="section-title">
      📋 选择要合并的工作表
      <span class="select-all" id="selectAllBtn">全选</span>
      <span class="select-all" style="margin-left:8px" id="deselectAllBtn">取消全选</span>
    </div>
    <div class="section-hint">勾选需要合并的工作表，可自定义合并后的工作表名称</div>
    <div style="overflow-x:auto">
      <table class="sheet-table" id="sheetTable">
        <thead>
          <tr><th style="width:40px">合并</th><th>来源文件</th><th>原工作表名</th><th>合并后名称</th></tr>
        </thead>
        <tbody id="sheetBody"></tbody>
      </table>
    </div>
    <div class="tool-actions">
      <button class="btn btn-primary" id="mergeBtn">🔗 开始合并</button>
      <button class="btn btn-secondary" id="clearBtn">🗑️ 清空所有</button>
    </div>
  </div>

  <div class="result-box" id="resultBox">
    <div class="result-title">✅ 合并完成</div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="tool-actions">
      <button class="btn btn-primary" id="downloadBtn">⬇ 下载合并结果</button>
    </div>
  </div>
</div>

<script>
let uploadedFiles = [];
let mergedData = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const sheetsSection = document.getElementById('sheetsSection');
const sheetBody = document.getElementById('sheetBody');
const mergeBtn = document.getElementById('mergeBtn');
const clearBtn = document.getElementById('clearBtn');
const resultBox = document.getElementById('resultBox');
const resultDetail = document.getElementById('resultDetail');
const downloadBtn = document.getElementById('downloadBtn');
const processing = document.getElementById('processing');
const selectAllBtn = document.getElementById('selectAllBtn');
const deselectAllBtn = document.getElementById('deselectAllBtn');

dropZone.onclick = () => fileInput.click();

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.xlsx?$/i)));
};

fileInput.onchange = () => {
  handleFiles(Array.from(fileInput.files));
  fileInput.value = '';
};

async function handleFiles(files) {
  if (files.length === 0) return;
  processing.classList.add('show');
  // Use setTimeout to let the UI update
  await new Promise(r => setTimeout(r, 50));

  for (const file of files) {
    // Check for duplicates
    if (uploadedFiles.some(f => f.file.name === file.name && f.file.size === file.size)) continue;
    try {
      const bytes = await file.arrayBuffer();
      const wb = XLSX.read(bytes, { type: 'array' });
      uploadedFiles.push({ file, wb, sheets: wb.SheetNames });
    } catch (err) {
      alert('无法读取文件: ' + file.name + '\n' + err.message);
    }
  }

  processing.classList.remove('show');
  renderSheetTable();
}

function renderSheetTable() {
  if (uploadedFiles.length === 0) {
    sheetsSection.style.display = 'none';
    return;
  }
  sheetsSection.style.display = 'block';

  let html = '';
  uploadedFiles.forEach((entry, fi) => {
    entry.sheets.forEach((sheetName, si) => {
      const id = `s_${fi}_${si}`;
      const mergedName = getDefaultMergedName(sheetName, fi, si);
      html += `<tr>
        <td><input type="checkbox" id="${id}" class="sheet-checkbox" data-fi="${fi}" data-si="${si}" checked></td>
        <td>${escapeHtml(entry.file.name)}</td>
        <td>${escapeHtml(sheetName)}</td>
        <td><input type="text" class="rename-input" data-fi="${fi}" data-si="${si}" value="${escapeHtml(mergedName)}"></td>
      </tr>`;
    });
  });
  sheetBody.innerHTML = html;

  // Bind check-all events
  selectAllBtn.onclick = () => document.querySelectorAll('.sheet-checkbox').forEach(c => c.checked = true);
  deselectAllBtn.onclick = () => document.querySelectorAll('.sheet-checkbox').forEach(c => c.checked = false);

  resultBox.classList.remove('show');
}

function getDefaultMergedName(sheetName, fi, si) {
  const names = new Set();
  let count = {};
  for (let f = 0; f <= fi; f++) {
    const entry = uploadedFiles[f];
    for (let s = 0; s < entry.sheets.length; s++) {
      if (f === fi && s >= si) break;
      const n = entry.sheets[s];
      names.add(n);
      count[n] = (count[n] || 0) + 1;
    }
  }
  if (!names.has(sheetName)) return sheetName;
  const suffix = (count[sheetName] || 0) + 1;
  return sheetName + '_' + suffix;
}

mergeBtn.onclick = async () => {
  const selected = [];
  document.querySelectorAll('.sheet-checkbox:checked').forEach(cb => {
    const fi = parseInt(cb.dataset.fi);
    const si = parseInt(cb.dataset.si);
    const renameInput = document.querySelector(`.rename-input[data-fi="${fi}"][data-si="${si}"]`);
    const mergedName = renameInput ? renameInput.value.trim() : uploadedFiles[fi].sheets[si];
    selected.push({
      fi, si,
      wb: uploadedFiles[fi].wb,
      sheetName: uploadedFiles[fi].sheets[si],
      mergedName: mergedName || uploadedFiles[fi].sheets[si]
    });
  });

  if (selected.length === 0) {
    alert('请至少勾选一个工作表');
    return;
  }

  mergeBtn.disabled = true;
  mergeBtn.textContent = '⏳ 合并中...';

  try {
    const mergedWB = XLSX.utils.book_new();
    const usedNames = new Set();

    for (const item of selected) {
      let finalName = item.mergedName;
      // Handle duplicate merged names
      if (usedNames.has(finalName)) {
        let i = 2;
        while (usedNames.has(finalName + '_' + i)) i++;
        finalName = finalName + '_' + i;
      }
      usedNames.add(finalName);

      const ws = item.wb.Sheets[item.sheetName];
      // Clone the worksheet
      const wsData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      const newWS = XLSX.utils.aoa_to_sheet(wsData);
      XLSX.utils.book_append_sheet(mergedWB, newWS, finalName);
    }

    const wbout = XLSX.write(mergedWB, { bookType: 'xlsx', type: 'array', bookSST: false });
    mergedData = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

    resultDetail.textContent = `成功合并 ${selected.length} 个工作表，来自 ${new Set(selected.map(s => s.fi)).size} 个文件`;
    resultBox.classList.add('show');
  } catch (err) {
    alert('合并失败: ' + err.message);
    console.error(err);
  } finally {
    mergeBtn.disabled = false;
    mergeBtn.textContent = '🔗 开始合并';
  }
};

downloadBtn.onclick = () => {
  if (!mergedData) return;
  const url = URL.createObjectURL(mergedData);
  const a = document.createElement('a');
  a.href = url;
  a.download = '合并结果_' + new Date().toISOString().slice(0,10) + '.xlsx';
  a.click();
  URL.revokeObjectURL(url);
};

clearBtn.onclick = () => {
  uploadedFiles = [];
  mergedData = null;
  sheetBody.innerHTML = '';
  sheetsSection.style.display = 'none';
  resultBox.classList.remove('show');
};

function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
