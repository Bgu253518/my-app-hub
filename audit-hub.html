<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审计项目工时任务协同系统 — 顾力菡·应用工坊</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg-deep: #0a0a14; --bg-card: rgba(22,22,44,0.6);
  --glass-border: rgba(255,255,255,0.08); --text-primary: #e8e8f0;
  --text-secondary: #9999b0; --accent-1: #7c5cfc; --accent-2: #5cfca0;
  --accent-3: #fc5c9c; --radius: 14px; --radius-sm: 8px;
  --transition: 0.2s ease;
}
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background: linear-gradient(160deg,#0a0a14 0%,#12122a 30%,#16163a 60%,#0d0d24 100%);
  color: var(--text-primary); min-height:100vh; line-height:1.6;
}
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 20%, rgba(124,92,252,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 60%, rgba(252,92,156,0.04) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(124,92,252,0.25); border-radius:3px; }

.header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,20,0.85); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  padding:0 20px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
}
.header .brand { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.header a { color:var(--text-secondary); text-decoration:none; font-size:13px; transition:var(--transition); }
.header a:hover { color:var(--text-primary); }
.header .role-badge {
  font-size:11px; padding:4px 12px; border-radius:20px;
  background:rgba(124,92,252,0.15); border:1px solid rgba(124,92,252,0.3); color:var(--accent-1);
}
.main { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }
.card {
  background:var(--bg-card); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:20px; margin-bottom:16px;
  backdrop-filter:blur(10px);
}
.card-title { font-size:15px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.card-hint { font-size:12px; color:var(--text-secondary); margin-bottom:12px; }

.btn {
  display:inline-flex; align-items:center; gap:4px; padding:7px 14px;
  border-radius:var(--radius-sm); font-size:12px; font-weight:600; cursor:pointer;
  border:1px solid var(--glass-border); background:rgba(255,255,255,0.05);
  color:var(--text-primary); transition:var(--transition); white-space:nowrap;
}
.btn:hover { background:rgba(255,255,255,0.1); }
.btn-primary { background:linear-gradient(135deg,#7c5cfc,#5ccafc); border:none; color:#fff; }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 4px 16px rgba(124,92,252,0.3); }
.btn-xs { padding:3px 8px; font-size:10px; border-radius:4px; }
.btn-danger { border-color:rgba(252,92,156,0.3); color:var(--accent-3); }
.btn-danger:hover { background:rgba(252,92,156,0.1); }
.btn-success { border-color:rgba(92,252,160,0.3); color:var(--accent-2); }
.btn-success:hover { background:rgba(92,252,160,0.1); }

input,select,textarea {
  background:rgba(255,255,255,0.05); border:1px solid var(--glass-border);
  border-radius:6px; padding:7px 10px; color:var(--text-primary);
  font-size:12px; outline:none; transition:var(--transition);
}
input:focus,select:focus,textarea:focus { border-color:var(--accent-1); }
select option { background:#1a1a2e; color:#e8e8f0; }

.status-tag {
  display:inline-block; font-size:10px; padding:2px 8px; border-radius:12px; font-weight:600;
}
.status-pending { background:rgba(255,255,255,0.05); color:var(--text-secondary); }
.status-active { background:rgba(124,92,252,0.15); color:var(--accent-1); }
.status-review { background:rgba(252,196,92,0.15); color:#fcc45c; }
.status-reviewed { background:rgba(92,200,252,0.15); color:#5cc8fc; }
.status-done { background:rgba(92,252,160,0.1); color:var(--accent-2); }

.progress-bar {
  height:6px; border-radius:3px; background:rgba(255,255,255,0.06); overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg,#7c5cfc,#5ccafc); transition:width 0.3s;
}

.modal-overlay {
  position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.7);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal {
  background:#1a1a2e; border:1px solid var(--glass-border); border-radius:var(--radius);
  padding:24px; max-width:700px; width:100%; max-height:85vh; overflow-y:auto;
}
.modal h3 { font-size:16px; margin-bottom:16px; }
.modal .form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:10px; }
.modal label { font-size:11px; color:var(--text-secondary); display:block; margin-bottom:3px; }

.toast {
  position:fixed; bottom:20px; right:20px; z-index:1000;
  background:rgba(22,22,44,0.95); border:1px solid var(--glass-border);
  padding:10px 18px; border-radius:var(--radius-sm); font-size:12px;
  backdrop-filter:blur(12px); transform:translateY(100px); opacity:0; transition:all 0.3s;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.error { border-color:rgba(252,92,156,0.4); }
.toast.success { border-color:rgba(92,252,160,0.4); }

.hidden { display:none !important; }
.flex-center { display:flex; align-items:center; gap:8px; }
.gap2 { display:flex; gap:8px; flex-wrap:wrap; }
.mt2 { margin-top:8px; } .mt3 { margin-top:12px; } .mb2 { margin-bottom:8px; }
.text-sm { font-size:12px; } .text-xs { font-size:10px; } .text-secondary { color:var(--text-secondary); }
.font-mono { font-family:monospace; }

.kanban-col {
  background:rgba(255,255,255,0.02); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); padding:12px; min-height:200px;
}
.kanban-col h4 { font-size:13px; margin-bottom:10px; text-align:center; }
.task-mini {
  background:var(--bg-card); border:1px solid var(--glass-border);
  border-radius:6px; padding:10px; margin-bottom:8px; font-size:11px; cursor:pointer;
  transition:var(--transition);
}
.task-mini:hover { border-color:var(--accent-1); }

@media (max-width:768px) {
  .main { padding:12px; }
}
</style>
</head>
<body>

<div class="header">
  <span class="brand">📋 审计项目工时任务协同系统</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="role-badge" id="roleBadge">审计员</span>
    <select id="roleSwitcher" onchange="switchRole(this.value)" style="font-size:11px;width:100px">
      <option value="auditor">审计员</option>
      <option value="pm">项目经理</option>
      <option value="reviewer">复核人</option>
      <option value="leader">组长</option>
      <option value="principal">所长</option>
    </select>
    <a href="index.html">← 返回</a>
  </div>
</div>

<div class="main">

  <!-- Tab Navigation -->
  <div class="card" style="padding:8px 16px;margin-bottom:16px">
    <div class="flex-center">
      <button class="btn btn-primary" id="tabHome" onclick="showView('home')">🏠 我的今日待办</button>
      <button class="btn" id="tabConsole" onclick="showView('console')">📊 公司主控台</button>
      <button class="btn" onclick="openProjectModal()">📁 新建项目</button>
      <button class="btn" onclick="openTaskModal()">➕ 新建任务</button>
      <button class="btn" onclick="openImportModal()">📥 导入工时</button>
      <button class="btn" onclick="exportExcel()">📤 导出Excel</button>
    </div>
  </div>

  <!-- ====== 首页：我的今日待办 ====== -->
  <div id="viewHome">
    <div class="card">
      <div class="card-title">📅 我的今日待办</div>
      <div class="flex-center mb2">
        <label class="text-sm text-secondary">日期筛选 ≤ </label>
        <input type="date" id="dateFilter" onchange="renderHome()" style="width:150px">
      </div>
      <div id="todoList"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">⏱ 今日已录工时</div>
        <div id="todayHours"></div>
      </div>
      <div class="card">
        <div class="card-title">📌 待处理事项</div>
        <div id="pendingItems"></div>
      </div>
    </div>
  </div>

  <!-- ====== 公司主控台 ====== -->
  <div id="viewConsole" class="hidden">
    <!-- Chart -->
    <div class="card">
      <div class="card-title">📊 角色工时分布</div>
      <div style="max-width:400px;margin:0 auto">
        <canvas id="hoursChart" height="200"></canvas>
      </div>
    </div>

    <!-- Kanban -->
    <div class="card">
      <div class="card-title">📋 任务看板</div>
      <div class="flex-center mb2">
        <select id="kanbanProject" onchange="renderKanban()" style="width:200px">
          <option value="">全部项目</option>
        </select>
        <button class="btn btn-sm" onclick="renderKanban()">刷新</button>
        <button class="btn btn-sm btn-success" onclick="exportJSON()">📦 JSON备份</button>
        <button class="btn btn-sm" onclick="exportPDF()">📄 PDF报告</button>
        <button class="btn btn-sm btn-danger" onclick="archiveProject()">📁 归档</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;overflow-x:auto" id="kanbanBoard"></div>
    </div>
  </div>

</div>

<!-- ====== Modals ====== -->
<div class="modal-overlay hidden" id="projectModal">
  <div class="modal">
    <h3>📁 <span id="pmTitle">新建项目</span></h3>
    <div class="form-row">
      <div><label>项目名称 *</label><input id="pmName"></div>
      <div><label>客户名称</label><input id="pmClient"></div>
    </div>
    <div class="form-row">
      <div><label>开始日期</label><input type="date" id="pmStart"></div>
      <div><label>结束日期</label><input type="date" id="pmEnd"></div>
    </div>
    <div class="form-row">
      <div><label>科目映射（自动生成任务）</label><select id="pmSubject"><option value="">不自动生成</option></select></div>
      <div><label>预算工时(h)</label><input type="number" id="pmBudget" value="80"></div>
    </div>
    <div><label>描述</label><textarea id="pmDesc" rows="2" style="width:100%"></textarea></div>
    <div class="flex-center mt3">
      <button class="btn btn-primary" onclick="saveProject()">保存</button>
      <button class="btn" onclick="closeModal('projectModal')">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <h3>➕ <span id="tmTitle">新建任务</span></h3>
    <div class="form-row">
      <div><label>所属项目 *</label><select id="tmProject" onchange="updateTaskModal()"></select></div>
      <div><label>任务名称 *</label><input id="tmName"></div>
    </div>
    <div class="form-row">
      <div><label>底稿分类</label><select id="tmCategory"></select></div>
      <div><label>优先级</label><select id="tmPriority"><option>普通</option><option>紧急</option><option>低</option></select></div>
    </div>
    <div class="form-row">
      <div><label>执行人（多人逗号分隔）</label><input id="tmAssignees" placeholder="张三,李四"></div>
      <div><label>复核人</label><input id="tmReviewer"></div>
    </div>
    <div class="form-row">
      <div><label>计划工时(h)</label><input type="number" id="tmPlannedHours" value="8"></div>
      <div><label>截止日期</label><input type="date" id="tmDueDate"></div>
    </div>
    <div class="flex-center mt3">
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
      <button class="btn" onclick="closeModal('taskModal')">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="progressModal">
  <div class="modal">
    <h3>📝 进度上报 - <span id="pgTaskName"></span></h3>
    <div id="pgAssignments"></div>
    <div class="form-row mt3">
      <div><label>问题记录</label><textarea id="pgIssue" rows="2" style="width:100%" placeholder="发现问题时填写..."></textarea></div>
    </div>
    <div class="flex-center mt2">
      <button class="btn btn-primary" onclick="submitProgress()">提交进度</button>
      <button class="btn" onclick="closeModal('progressModal')">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="importModal">
  <div class="modal">
    <h3>📥 导入工时 Excel</h3>
    <p class="card-hint">Excel 需包含列：项目名称、任务名称、执行人、日期、工时(h)、备注(可选)</p>
    <input type="file" id="importFile" accept=".xlsx,.xls" onchange="handleImport(this)">
    <div id="importResult" class="mt2 text-sm"></div>
    <button class="btn mt2" onclick="closeModal('importModal')">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ========================= DATA LAYER =========================
const STORE = {
  projects: 'ah_projects', tasks: 'ah_tasks', timeEntries: 'ah_time',
  problems: 'ah_problems', archive: 'ah_archive', settings: 'ah_settings'
};

// Subject mapping for auto-generating tasks
const SUBJECT_MAPPING = {
  '年报审计': ['初步业务活动','风险评估','控制测试','实质性程序-货币资金','实质性程序-应收款项','实质性程序-存货','实质性程序-固定资产','实质性程序-应付款项','实质性程序-营业收入','实质性程序-期间费用','期后事项','关联交易','完成阶段-试算平衡','完成阶段-报告编制'],
  '专项审计': ['业务约定书','资料清单','初步分析','实质性程序','问题汇总','报告编制','归档'],
  '税务审计': ['税务资料收集','税基核实','优惠核查','调整事项','报告编制'],
  '内控审计': ['了解内控','穿行测试','控制测试','缺陷评价','报告编制']
};

const CATEGORIES = ['初步业务活动','风险评估','控制测试','实质性程序','完成阶段','其他'];

function initData() {
  if (!localStorage.getItem(STORE.projects)) {
    const sample = [{
      id: crypto.randomUUID(), name: 'ABC公司2025年报审计', client: 'ABC科技有限公司',
      startDate: '2025-01-06', endDate: '2025-04-30', budget: 120,
      subject: '年报审计', actualHours: 35, status: 'active', createdAt: new Date().toISOString()
    }];
    localStorage.setItem(STORE.projects, JSON.stringify(sample));
  }
  if (!localStorage.getItem(STORE.tasks)) {
    const pid = JSON.parse(localStorage.getItem(STORE.projects))[0].id;
    const tasks = [
      { id: crypto.randomUUID(), projectId: pid, name: '货币资金审计', category: '实质性程序',
        priority: '紧急', plannedHours: 24, actualHours: 12,
        assignees: [
          { name: '张三', progress: 60, hours: 8, status: 'active' },
          { name: '李四', progress: 30, hours: 4, status: 'active' }
        ],
        reviewer: '王五', status: 'active', dueDate: '2025-03-15',
        problems: [], createdAt: new Date().toISOString() },
      { id: crypto.randomUUID(), projectId: pid, name: '应收账款函证', category: '实质性程序',
        priority: '紧急', plannedHours: 16, actualHours: 8,
        assignees: [{ name: '张三', progress: 100, hours: 8, status: 'done' }],
        reviewer: '王五', status: 'review', dueDate: '2025-03-10',
        problems: [{ text: '3笔函证未回函，已替代程序', date: '2025-03-08' }], createdAt: new Date().toISOString() },
      { id: crypto.randomUUID(), projectId: pid, name: '风险评估问卷', category: '风险评估',
        priority: '普通', plannedHours: 8, actualHours: 8,
        assignees: [{ name: '李四', progress: 100, hours: 8, status: 'done' }],
        reviewer: '王五', status: 'done', dueDate: '2025-02-20',
        problems: [], createdAt: new Date().toISOString() }
    ];
    localStorage.setItem(STORE.tasks, JSON.stringify(tasks));
  }
  if (!localStorage.getItem(STORE.timeEntries)) {
    const entries = [
      { id: crypto.randomUUID(), projectId: JSON.parse(localStorage.getItem(STORE.projects))[0].id,
        taskId: JSON.parse(localStorage.getItem(STORE.tasks))[0].id,
        person: '张三', date: new Date().toISOString().slice(0,10), hours: 3, note: '银行对账单核对' }
    ];
    localStorage.setItem(STORE.timeEntries, JSON.stringify(entries));
  }
  if (!localStorage.getItem(STORE.archive)) localStorage.setItem(STORE.archive, '[]');
  if (!localStorage.getItem(STORE.settings)) {
    localStorage.setItem(STORE.settings, JSON.stringify({ dateFilter: new Date().toISOString().slice(0,10) }));
  }
}

// ========================= API =========================
const api = {
  getProjects: () => JSON.parse(localStorage.getItem(STORE.projects) || '[]'),
  saveProjects: (v) => localStorage.setItem(STORE.projects, JSON.stringify(v)),
  getTasks: () => JSON.parse(localStorage.getItem(STORE.tasks) || '[]'),
  saveTasks: (v) => localStorage.setItem(STORE.tasks, JSON.stringify(v)),
  getTimeEntries: () => JSON.parse(localStorage.getItem(STORE.timeEntries) || '[]'),
  saveTimeEntries: (v) => localStorage.setItem(STORE.timeEntries, JSON.stringify(v)),
  getArchive: () => JSON.parse(localStorage.getItem(STORE.archive) || '[]'),
  saveArchive: (v) => localStorage.setItem(STORE.archive, JSON.stringify(v)),
  getSettings: () => JSON.parse(localStorage.getItem(STORE.settings) || '{}'),
  saveSettings: (v) => localStorage.setItem(STORE.settings, JSON.stringify(v)),

  addProject(p) { const ps = this.getProjects(); p.id = crypto.randomUUID(); p.createdAt = new Date().toISOString(); p.actualHours = 0; p.status = p.status || 'active'; ps.push(p); this.saveProjects(ps); return p; },
  addTask(t) { const ts = this.getTasks(); t.id = crypto.randomUUID(); t.createdAt = new Date().toISOString(); t.actualHours = 0; t.problems = []; t.status = t.status || 'pending'; ts.push(t); this.saveTasks(ts); return t; },
  addTimeEntry(e) { const es = this.getTimeEntries(); e.id = crypto.randomUUID(); es.push(e); this.saveTimeEntries(es); return e; },
  addProblem(taskId, text) { const ts = this.getTasks(); const t = ts.find(x => x.id === taskId); if (t) { t.problems.push({ text, date: new Date().toISOString().slice(0,10) }); this.saveTasks(ts); } },

  updateTask(id, upd) { const ts = this.getTasks(); const idx = ts.findIndex(x => x.id === id); if (idx >= 0) { Object.assign(ts[idx], upd); this.saveTasks(ts); } },
  updateProject(id, upd) { const ps = this.getProjects(); const idx = ps.findIndex(x => x.id === id); if (idx >= 0) { Object.assign(ps[idx], upd); this.saveProjects(ps); } },

  getProjectTasks(pid) { return this.getTasks().filter(t => t.projectId === pid); },
  getPersonTasks(person) { return this.getTasks().filter(t => t.assignees && t.assignees.some(a => a.name === person)); },
  getTodayHours(person) { const today = new Date().toISOString().slice(0,10); return this.getTimeEntries().filter(e => e.person === person && e.date <= today).reduce((s,e) => s + e.hours, 0); },
  getTotalHoursByRole() { /* simplified */ return { '审计员': 25, '项目经理': 15, '复核人': 10, '组长': 8, '所长': 5 }; }
};

// ========================= STATE =========================
let currentRole = 'auditor';
let currentView = 'home';

// ========================= ROLE =========================
function switchRole(role) {
  currentRole = role;
  const map = { auditor:'审计员', pm:'项目经理', reviewer:'复核人', leader:'组长', principal:'所长' };
  document.getElementById('roleBadge').textContent = map[role];
  renderAll();
  toast('已切换为 ' + map[role]);
}

// ========================= VIEWS =========================
function showView(v) {
  currentView = v;
  document.getElementById('viewHome').classList.toggle('hidden', v !== 'home');
  document.getElementById('viewConsole').classList.toggle('hidden', v !== 'console');
  document.getElementById('tabHome').className = 'btn' + (v === 'home' ? ' btn-primary' : '');
  document.getElementById('tabConsole').className = 'btn' + (v === 'console' ? ' btn-primary' : '');
  if (v === 'home') renderHome();
  else renderConsole();
}

function renderAll() { currentView === 'home' ? renderHome() : renderConsole(); }

// ========================= HOME =========================
function renderHome() {
  const dateFilter = document.getElementById('dateFilter').value || new Date().toISOString().slice(0,10);
  document.getElementById('dateFilter').value = dateFilter;
  const tasks = api.getTasks().filter(t => t.dueDate <= dateFilter);
  const person = currentRole === 'auditor' ? '张三' : currentRole === 'pm' ? '项目经理' : currentRole === 'reviewer' ? '王五' : '组长';

  // Task cards
  const myTasks = tasks.filter(t => t.assignees && t.assignees.some(a => a.name === person));
  const todoDiv = document.getElementById('todoList');
  if (myTasks.length === 0) {
    todoDiv.innerHTML = '<p class="text-sm text-secondary">暂无待办任务 🎉</p>';
  } else {
    todoDiv.innerHTML = myTasks.map(t => {
      const myAssign = t.assignees.find(a => a.name === person);
      const pct = myAssign ? myAssign.progress : 0;
      const proj = api.getProjects().find(p => p.id === t.projectId);
      const st = t.status === 'done' ? 'status-done' : t.status === 'review' ? 'status-review' : t.status === 'reviewed' ? 'status-reviewed' : 'status-active';
      const stLabel = { pending:'待开始', active:'进行中', review:'待复核', reviewed:'复核完成', done:'完成' }[t.status] || t.status;
      return `<div class="card" style="padding:14px;cursor:pointer" onclick="openProgressModal('${t.id}')">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div>
            <span class="status-tag ${st}">${stLabel}</span>
            <strong style="margin-left:8px">${t.name}</strong>
            ${proj ? `<span class="text-xs text-secondary ml-2">[${proj.name}]</span>` : ''}
          </div>
          <span class="text-xs text-secondary">⏰ ${t.dueDate || '-'}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="flex-center mt2 text-xs text-secondary">
          <span>进度 ${pct}%</span>
          <span>|</span>
          <span>已录工时 ${myAssign ? myAssign.hours : 0}h / ${t.plannedHours}h</span>
          ${t.problems.length > 0 ? `<span>|</span><span style="color:var(--accent-3)">⚠ ${t.problems.length}个问题</span>` : ''}
        </div>
        <div class="gap2 mt2">
          <button class="btn btn-xs" onclick="event.stopPropagation();openProgressModal('${t.id}')">📝 上报进度</button>
          <button class="btn btn-xs" onclick="event.stopPropagation();showTimeEntry('${t.id}')">⏱ 记录工时</button>
        </div>
      </div>`;
    }).join('');
  }

  // Today's hours
  const todayHours = api.getTodayHours(person);
  document.getElementById('todayHours').innerHTML = `
    <div style="font-size:28px;font-weight:700;color:var(--accent-1)">${todayHours}h</div>
    <p class="text-sm text-secondary">今日已录入工时</p>
  `;

  // Pending items
  const pendingTasks = api.getTasks().filter(t => t.status === 'review' && t.reviewer === person);
  document.getElementById('pendingItems').innerHTML = pendingTasks.length === 0
    ? '<p class="text-sm text-secondary">无待处理事项</p>'
    : pendingTasks.map(t => `<div class="text-sm mb2">📋 ${t.name} — <span style="color:#fcc45c">待复核</span>
        <button class="btn btn-xs btn-success ml-2" onclick="reviewTask('${t.id}')">复核通过</button></div>`).join('');
}

function showTimeEntry(taskId) {
  const hours = prompt('录入工时（小时）：', '2');
  if (!hours || isNaN(+hours)) return;
  const t = api.getTasks().find(x => x.id === taskId);
  if (!t) return;
  const person = currentRole === 'auditor' ? '张三' : currentRole === 'pm' ? '项目经理' : '王五';
  api.addTimeEntry({
    projectId: t.projectId, taskId, person,
    date: new Date().toISOString().slice(0,10), hours: +hours, note: ''
  });
  t.actualHours = (t.actualHours || 0) + (+hours);
  const assign = t.assignees.find(a => a.name === person);
  if (assign) assign.hours = (assign.hours || 0) + (+hours);
  api.updateTask(taskId, { actualHours: t.actualHours, assignees: t.assignees });
  renderHome();
  toast('✓ 工时已记录');
}

// ========================= PROGRESS =========================
function openProgressModal(taskId) {
  const t = api.getTasks().find(x => x.id === taskId);
  if (!t) return;
  document.getElementById('pgTaskName').textContent = t.name;
  document.getElementById('progressModal').dataset.taskId = taskId;
  document.getElementById('pgIssue').value = '';
  document.getElementById('pgAssignments').innerHTML = (t.assignees || []).map((a, i) => `
    <div class="card" style="padding:10px;margin-bottom:8px">
      <div class="flex-center" style="justify-content:space-between">
        <strong class="text-sm">${a.name}</strong>
        <span class="status-tag ${a.status === 'done' ? 'status-done' : 'status-active'}">${a.status === 'done' ? '已完成' : '进行中'}</span>
      </div>
      <div class="flex-center mt2">
        <input type="range" value="${a.progress}" min="0" max="100" oninput="this.nextElementSibling.textContent=this.value+'%'" style="flex:1">
        <span class="text-sm font-mono" style="width:40px">${a.progress}%</span>
      </div>
      <div class="flex-center mt2">
        <input type="number" value="${a.hours}" placeholder="工时(h)" style="width:80px" data-assignee="${i}" data-field="hours">
        <select style="width:100px" data-assignee="${i}" data-field="status">
          <option value="active" ${a.status==='active'?'selected':''}>进行中</option>
          <option value="done" ${a.status==='done'?'selected':''}>已完成</option>
        </select>
      </div>
    </div>
  `).join('');
  document.getElementById('progressModal').classList.remove('hidden');
}

function submitProgress() {
  const taskId = document.getElementById('progressModal').dataset.taskId;
  const t = api.getTasks().find(x => x.id === taskId);
  if (!t) return;

  // Read updated assignments
  document.querySelectorAll('#pgAssignments .card').forEach((card, i) => {
    const hoursInp = card.querySelector('[data-field="hours"]');
    const statusSel = card.querySelector('[data-field="status"]');
    const rangeInp = card.querySelector('input[type="range"]');
    if (hoursInp) t.assignees[i].hours = +hoursInp.value || t.assignees[i].hours;
    if (statusSel) t.assignees[i].status = statusSel.value;
    if (rangeInp) t.assignees[i].progress = +rangeInp.value;
  });

  // Accumulate hours
  t.actualHours = t.assignees.reduce((s, a) => s + (a.hours || 0), 0);

  // Check if all done → review
  const allDone = t.assignees.every(a => a.status === 'done');
  if (allDone && t.status === 'active') t.status = 'review';

  // Record issue
  const issue = document.getElementById('pgIssue').value.trim();
  if (issue) api.addProblem(taskId, issue);

  api.updateTask(taskId, { assignees: t.assignees, actualHours: t.actualHours, status: t.status });
  closeModal('progressModal');
  renderAll();
  toast('✓ 进度已更新');
}

// ========================= REVIEW =========================
function reviewTask(taskId) {
  if (!confirm('确认复核通过？')) return;
  api.updateTask(taskId, { status: 'reviewed' });
  renderAll();
  toast('✓ 复核已通过');
}

// ========================= CONSOLE =========================
function renderConsole() {
  renderKanban();
  renderChart();
  // Populate project filter
  const sel = document.getElementById('kanbanProject');
  sel.innerHTML = '<option value="">全部项目</option>' + api.getProjects().map(p => `<option value="${p.id}">${p.name}</option>`).join('');
}

function renderKanban() {
  const pid = document.getElementById('kanbanProject').value;
  let tasks = api.getTasks();
  if (pid) tasks = tasks.filter(t => t.projectId === pid);

  const columns = {
    pending: { title: '📌 待开始', tasks: [] },
    active: { title: '🔄 进行中', tasks: [] },
    review: { title: '🔍 待复核', tasks: [] },
    reviewed: { title: '✅ 复核完成', tasks: [] },
    done: { title: '🏁 完成', tasks: [] }
  };
  tasks.forEach(t => {
    const key = t.status === 'reviewed' ? 'reviewed' : ['pending','active','review','done'].includes(t.status) ? t.status : 'pending';
    if (columns[key]) columns[key].tasks.push(t);
  });

  document.getElementById('kanbanBoard').innerHTML = Object.entries(columns).map(([key, col]) => `
    <div class="kanban-col">
      <h4>${col.title} <span class="text-xs text-secondary">(${col.tasks.length})</span></h4>
      ${col.tasks.map(t => {
        const proj = api.getProjects().find(p => p.id === t.projectId);
        const totalPct = t.assignees && t.assignees.length > 0
          ? Math.round(t.assignees.reduce((s,a) => s + a.progress, 0) / t.assignees.length) : 0;
        return `<div class="task-mini" onclick="openProgressModal('${t.id}')">
          <div class="flex-center" style="justify-content:space-between">
            <strong>${t.name}</strong>
            ${key === 'review' && (currentRole === 'reviewer' || currentRole === 'leader' || currentRole === 'principal')
              ? `<button class="btn btn-xs btn-success" onclick="event.stopPropagation();reviewTask('${t.id}')">✓</button>`
              : ''}
            ${key === 'reviewed' && (currentRole === 'leader' || currentRole === 'principal')
              ? `<button class="btn btn-xs btn-primary" onclick="event.stopPropagation();confirmTask('${t.id}')">确认完成</button>`
              : ''}
          </div>
          <div class="progress-bar mt2"><div class="progress-fill" style="width:${totalPct}%"></div></div>
          <div class="text-xs text-secondary mt2">${proj ? proj.name : ''} | ${t.assignees ? t.assignees.map(a=>a.name).join(',') : ''} | ${totalPct}%</div>
          ${t.problems.length > 0 ? `<div class="text-xs" style="color:var(--accent-3)">⚠ ${t.problems.length}个问题</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function confirmTask(taskId) {
  if (!confirm('确认任务完成？')) return;
  api.updateTask(taskId, { status: 'done' });
  renderConsole();
  toast('✓ 任务已确认完成');
}

function renderChart() {
  const canvas = document.getElementById('hoursChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (canvas._chart) canvas._chart.destroy();
  const data = api.getTotalHoursByRole();
  canvas._chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(data),
      datasets: [{
        data: Object.values(data),
        backgroundColor: ['#7c5cfc','#5ccafc','#5cfca0','#fcc45c','#fc5c9c'],
        borderColor: 'rgba(10,10,20,0.8)',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#9999b0', font: { size: 11 }, padding: 14 } }
      }
    }
  });
}

// ========================= PROJECT MODAL =========================
function openProjectModal() {
  document.getElementById('pmTitle').textContent = '新建项目';
  document.getElementById('pmName').value = '';
  document.getElementById('pmClient').value = '';
  document.getElementById('pmStart').value = new Date().toISOString().slice(0,10);
  document.getElementById('pmEnd').value = '';
  document.getElementById('pmDesc').value = '';
  document.getElementById('pmBudget').value = '80';
  const subSel = document.getElementById('pmSubject');
  subSel.innerHTML = '<option value="">不自动生成</option>' + Object.keys(SUBJECT_MAPPING).map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('projectModal').classList.remove('hidden');
}

function saveProject() {
  const name = document.getElementById('pmName').value.trim();
  if (!name) { toast('请输入项目名称', 'error'); return; }
  const subject = document.getElementById('pmSubject').value;
  const p = api.addProject({
    name, client: document.getElementById('pmClient').value.trim(),
    startDate: document.getElementById('pmStart').value,
    endDate: document.getElementById('pmEnd').value,
    budget: +document.getElementById('pmBudget').value || 80,
    subject: subject || '',
    description: document.getElementById('pmDesc').value.trim(),
    status: 'active'
  });

  // Auto-generate tasks from subject mapping
  if (subject && SUBJECT_MAPPING[subject]) {
    SUBJECT_MAPPING[subject].forEach(taskName => {
      api.addTask({
        projectId: p.id, name: taskName,
        category: CATEGORIES.find(c => taskName.includes(c)) || '其他',
        priority: '普通', plannedHours: 8, actualHours: 0,
        assignees: [{ name: '张三', progress: 0, hours: 0, status: 'pending' }],
        reviewer: '', status: 'pending', dueDate: p.endDate, problems: []
      });
    });
    toast(`✓ 项目创建成功，已自动生成 ${SUBJECT_MAPPING[subject].length} 条任务`);
  } else {
    toast('✓ 项目创建成功');
  }
  closeModal('projectModal');
  renderAll();
}

// ========================= TASK MODAL =========================
function openTaskModal() {
  document.getElementById('tmTitle').textContent = '新建任务';
  document.getElementById('tmName').value = '';
  document.getElementById('tmAssignees').value = '';
  document.getElementById('tmReviewer').value = '';
  document.getElementById('tmPlannedHours').value = '8';
  document.getElementById('tmDueDate').value = '';
  updateTaskModal();
  document.getElementById('taskModal').classList.remove('hidden');
}

function updateTaskModal() {
  const sel = document.getElementById('tmProject');
  sel.innerHTML = api.getProjects().map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  const catSel = document.getElementById('tmCategory');
  catSel.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
}

function saveTask() {
  const name = document.getElementById('tmName').value.trim();
  const pid = document.getElementById('tmProject').value;
  if (!name || !pid) { toast('请填写任务名称和所属项目', 'error'); return; }
  const assigneeNames = document.getElementById('tmAssignees').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  const plannedHours = +document.getElementById('tmPlannedHours').value || 8;
  const perPerson = Math.floor(plannedHours / (assigneeNames.length || 1));

  api.addTask({
    projectId: pid, name,
    category: document.getElementById('tmCategory').value,
    priority: document.getElementById('tmPriority').value,
    plannedHours,
    assignees: assigneeNames.map(name => ({ name, progress: 0, hours: 0, status: 'pending' })),
    reviewer: document.getElementById('tmReviewer').value.trim(),
    status: 'pending',
    dueDate: document.getElementById('tmDueDate').value,
    problems: []
  });
  toast(`✓ 任务已创建，${assigneeNames.length}人分配，人均${perPerson}h`);
  closeModal('taskModal');
  renderAll();
}

// ========================= IMPORT =========================
function openImportModal() { document.getElementById('importModal').classList.remove('hidden'); document.getElementById('importResult').innerHTML = ''; }

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      let count = 0;
      rows.forEach(row => {
        const projectName = row['项目名称'] || row['project'];
        const taskName = row['任务名称'] || row['task'];
        const person = row['执行人'] || row['person'];
        const date = row['日期'] || row['date'];
        const hours = +(row['工时(h)'] || row['hours'] || 0);
        if (!projectName || !taskName || !person || !hours) return;

        // Find or create project
        let proj = api.getProjects().find(p => p.name === projectName);
        if (!proj) proj = api.addProject({ name: projectName, client: '', startDate: date, endDate: date, budget: hours * 10, subject: '', status: 'active' });

        // Find or create task
        let task = api.getTasks().find(t => t.projectId === proj.id && t.name === taskName);
        if (!task) {
          task = api.addTask({
            projectId: proj.id, name: taskName, category: '其他', priority: '普通',
            plannedHours: hours * 2, actualHours: 0,
            assignees: [{ name: person, progress: 0, hours: hours, status: 'active' }],
            reviewer: '', status: 'active', dueDate: date, problems: []
          });
        } else {
          task.actualHours = (task.actualHours || 0) + hours;
          const assign = task.assignees.find(a => a.name === person);
          if (assign) assign.hours = (assign.hours || 0) + hours;
          else task.assignees.push({ name: person, progress: 0, hours, status: 'active' });
          api.updateTask(task.id, { actualHours: task.actualHours, assignees: task.assignees });
        }

        api.addTimeEntry({ projectId: proj.id, taskId: task.id, person, date: String(date), hours, note: row['备注'] || '' });
        count++;
      });
      document.getElementById('importResult').innerHTML = `<span style="color:var(--accent-2)">✓ 成功导入 ${count} 条工时记录，自动创建项目和分配</span>`;
    } catch(err) {
      document.getElementById('importResult').innerHTML = `<span style="color:var(--accent-3)">✗ 导入失败：${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========================= EXPORT =========================
function exportExcel() {
  const projects = api.getProjects();
  const tasks = api.getTasks();
  const entries = api.getTimeEntries();

  const wb = XLSX.utils.book_new();

  // Sheet 1: Project overview
  const pRows = projects.map(p => ({ '项目名称': p.name, '客户': p.client, '开始': p.startDate, '结束': p.endDate, '预算(h)': p.budget, '实际(h)': p.actualHours, '状态': p.status }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pRows), '项目概览');

  // Sheet 2: Task progress
  const tRows = tasks.map(t => {
    const proj = projects.find(p => p.id === t.projectId);
    return { '项目': proj?.name || '', '任务': t.name, '分类': t.category, '优先级': t.priority, '计划(h)': t.plannedHours, '实际(h)': t.actualHours, '执行人': (t.assignees||[]).map(a=>`${a.name}(${a.progress}%)`).join(';'), '复核人': t.reviewer, '状态': t.status, '截止': t.dueDate };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tRows), '任务进度明细');

  // Sheet 3: Hours summary
  const eRows = entries.map(e => {
    const t = tasks.find(x => x.id === e.taskId);
    const p = projects.find(x => x.id === e.projectId);
    return { '项目': p?.name || '', '任务': t?.name || '', '执行人': e.person, '日期': e.date, '工时(h)': e.hours, '备注': e.note };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(eRows), '工时汇总');

  // Sheet 4: Problems
  const probRows = tasks.filter(t => t.problems.length > 0).flatMap(t => t.problems.map(pr => ({ '任务': t.name, '问题': pr.text, '日期': pr.date })));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(probRows), '问题日志');

  XLSX.writeFile(wb, `项目全景快照_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Excel 导出完成（4个工作表）');
}

function exportJSON() {
  const data = { projects: api.getProjects(), tasks: api.getTasks(), timeEntries: api.getTimeEntries(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `审计数据备份_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast('✓ JSON 备份已下载');
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const projects = api.getProjects();
  const tasks = api.getTasks();

  doc.setFontSize(16);
  doc.text('审计项目报告', 20, 20);
  doc.setFontSize(10);
  let y = 35;

  projects.forEach(p => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFontSize(12);
    doc.text(`项目：${p.name}`, 20, y);
    y += 7;
    doc.setFontSize(9);
    const ptasks = tasks.filter(t => t.projectId === p.id);
    ptasks.forEach(t => {
      if (y > 275) { doc.addPage(); y = 20; }
      doc.text(`  ${t.status === 'done' ? '✓' : t.status === 'review' ? '○' : '·'} ${t.name} [${t.status}] ${t.assignees ? t.assignees.map(a=>`${a.name} ${a.progress}%`).join(', ') : ''}`, 20, y);
      y += 5;
    });
    y += 8;
  });

  doc.save(`审计报告_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('✓ PDF 报告已下载');
}

function archiveProject() {
  const pid = document.getElementById('kanbanProject').value;
  if (!pid) { toast('请选择项目', 'error'); return; }
  const proj = api.getProjects().find(p => p.id === pid);
  const tasks = api.getTasks().filter(t => t.projectId === pid);
  const entries = api.getTimeEntries().filter(e => e.projectId === pid);

  // Integrity check
  const incomplete = tasks.filter(t => t.status !== 'done');
  if (incomplete.length > 0) {
    if (!confirm(`还有 ${incomplete.length} 个任务未完成：\n${incomplete.map(t=>'· '+t.name).join('\n')}\n\n确定要归档吗？`)) return;
  }

  // Deep copy snapshot
  const snapshot = {
    project: JSON.parse(JSON.stringify(proj)),
    tasks: JSON.parse(JSON.stringify(tasks)),
    timeEntries: JSON.parse(JSON.stringify(entries)),
    archivedAt: new Date().toISOString()
  };
  const archive = api.getArchive();
  archive.push(snapshot);
  api.saveArchive(archive);

  // Remove from active
  api.saveProjects(api.getProjects().filter(p => p.id !== pid));
  api.saveTasks(api.getTasks().filter(t => t.projectId !== pid));
  api.saveTimeEntries(api.getTimeEntries().filter(e => e.projectId !== pid));

  toast(`✓ 项目「${proj.name}」已归档，快照已保存`);
  renderConsole();
}

// ========================= UTILS =========================
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + (type || '') + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

initData();
document.getElementById('dateFilter').value = new Date().toISOString().slice(0,10);
renderHome();

// Click outside modal to close
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
});
